<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OKR LENS — 평가 기준</title>
<style>/* ============================================================
   OKR LENS — Design System
   colors_and_type.css
   사내 OKR 평가·코칭 AI 서비스 — 친근한 SaaS 톤 · 넉넉한 여백
   ============================================================ */

/* ---------- 1. Fonts ---------- */
@font-face {
  font-family: 'Pretendard';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Medium.woff2') format('woff2');
}

:root {
  /* ---------- 2. Color — Brand / Primary (Friendly Blue) ---------- */
  /* 참고 이미지의 SSO 버튼/CTA 컬러에서 추출. 인디고가 아닌 더 밝은 'Friendly Blue'. */
  --brand-900: #142250;   /* deepest — text accent on light bg */
  --brand-800: #1B2A4E;   /* dark navy — sidebar, hero text accent (참고 이미지 좌측 다크 카드) */
  --brand-700: #213A8C;
  --brand-600: #2C49B8;
  --brand-500: #3B5BDB;   /* PRIMARY — SSO 버튼 컬러 */
  --brand-400: #5C7AE6;
  --brand-300: #91A6F0;
  --brand-200: #C5D0F7;
  --brand-100: #E5EBFB;
  --brand-50:  #F1F4FD;

  /* ---------- 3. Role Accents (3역할 컬러 코딩) ---------- */
  /* 참고 이미지: 피평가자=블루, 평가자=그린, 인사담당자=오렌지/코랄 */
  --role-r1-bg:   #E8F0FF;
  --role-r1-fg:   #3B5BDB;
  --role-r1-mark: #3B5BDB;

  --role-r2-bg:   #E3F4EA;
  --role-r2-fg:   #2F9E5E;
  --role-r2-mark: #2F9E5E;

  --role-r3-bg:   #FFEDE2;
  --role-r3-fg:   #E07A3C;
  --role-r3-mark: #E07A3C;

  /* ---------- 4. Color — Neutrals (Cool Slate, softer than v1) ---------- */
  --ink-900: #0F1A36;     /* heading */
  --ink-800: #1F2A4A;
  --ink-700: #3A4565;     /* body strong */
  --ink-600: #5B6685;     /* body */
  --ink-500: #7C87A4;     /* secondary */
  --ink-400: #A4ADC4;     /* tertiary, icon */
  --ink-300: #C8CFDF;     /* disabled */
  --ink-200: #E1E5EF;     /* divider */
  --ink-150: #ECEFF5;
  --ink-100: #F4F7FB;     /* PAGE BACKGROUND — 참고 이미지 베이스 */
  --ink-50:  #F9FAFC;
  --ink-0:   #FFFFFF;

  /* ---------- 5. Color — Semantic (Status) ---------- */
  /* 친근한 톤 — 채도 더 낮춤. "코칭" 시선 유지. */
  --risk-high-fg:   #D14343;
  --risk-high-bg:   #FFF0F0;
  --risk-high-bd:   #FFD4D4;

  --risk-mid-fg:    #D98023;
  --risk-mid-bg:    #FFF7EC;
  --risk-mid-bd:    #FFE0BA;

  --risk-low-fg:    #2F9E5E;
  --risk-low-bg:    #ECFAF1;
  --risk-low-bd:    #BBE9CC;

  --info-fg:        #2B5DD9;
  --info-bg:        #EFF4FE;
  --info-bd:        #C5D5F7;

  /* ---------- 6. Status — 승인 enum (D5) ---------- */
  --status-draft-fg:    #5B6685;
  --status-draft-bg:    #F1F3F8;
  --status-pending-fg:  #2B5DD9;
  --status-pending-bg:  #EFF4FE;
  --status-approved-fg: #2F9E5E;
  --status-approved-bg: #ECFAF1;
  --status-rejected-fg: #D14343;
  --status-rejected-bg: #FFF0F0;
  --status-adjust-fg:   #D98023;
  --status-adjust-bg:   #FFF7EC;

  /* ---------- 7. Difficulty / Grade ---------- */
  --diff-high: #7C4DD9;
  --diff-mid:  #3B5BDB;
  --diff-low:  #7C87A4;

  --grade-s: #6B47E0;
  --grade-a: #3B5BDB;
  --grade-b: #2F9E5E;
  --grade-c: #D98023;
  --grade-d: #7C87A4;

  /* ---------- 8. Data viz / Heatmap ---------- */
  --heat-0: #F1F4FD;
  --heat-1: #DCE3F8;
  --heat-2: #B7C4F0;
  --heat-3: #8FA1E5;
  --heat-4: #5C7AE6;
  --heat-5: #3B5BDB;

  /* ---------- 9. Typography — Stacks ---------- */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular,
               'SF Mono', Consolas, 'Liberation Mono', monospace;

  /* ---------- 10. Type — Sizes & line-heights ---------- */
  /* base 15px — 참고 이미지의 넉넉한 밀도에 맞춰 한 단계 키움 */
  --fs-hero:     48px;   /* 랜딩 메인 헤드라인 */
  --fs-display:  36px;
  --fs-h1:       28px;
  --fs-h2:       22px;
  --fs-h3:       18px;
  --fs-body-lg:  16px;
  --fs-body:     15px;   /* body default */
  --fs-sm:       13.5px;
  --fs-xs:       12.5px;
  --fs-micro:    11.5px;

  --lh-tight:    1.25;
  --lh-snug:     1.45;
  --lh-normal:   1.7;
  --lh-relaxed:  1.85;

  --tracking-tight:  -0.025em;
  --tracking-normal: -0.005em;
  --tracking-wide:   0.04em;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* ---------- 11. Spacing scale (4pt grid) ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;
  --sp-11: 80px;
  --sp-12: 96px;

  /* ---------- 12. Radius — 더 부드럽게 ---------- */
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;    /* 기본 카드 */
  --radius-xl: 20px;    /* 큰 카드, 패널 */
  --radius-2xl: 28px;   /* 히어로 일러스트 박스 */
  --radius-pill: 999px;

  /* ---------- 13. Shadow / Elevation — 부드럽고 옅음 ---------- */
  --shadow-xs: 0 1px 2px rgba(31, 42, 74, 0.04);
  --shadow-sm: 0 2px 6px rgba(31, 42, 74, 0.05);
  --shadow-md: 0 6px 16px -4px rgba(31, 42, 74, 0.08);
  --shadow-lg: 0 16px 40px -10px rgba(31, 42, 74, 0.10);
  --shadow-xl: 0 30px 60px -16px rgba(31, 42, 74, 0.16);
  --shadow-focus: 0 0 0 4px rgba(59, 91, 219, 0.16);
  --shadow-card-hover: 0 12px 28px -8px rgba(59, 91, 219, 0.18);

  /* ---------- 14. Borders ---------- */
  --bd-subtle: 1px solid var(--ink-150);
  --bd-default: 1px solid var(--ink-200);
  --bd-strong: 1px solid var(--ink-300);
  --bd-focus: 1.5px solid var(--brand-500);

  /* ---------- 15. Motion ---------- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 320ms;

  /* ---------- 16. Layout ---------- */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --content-max: 1440px;
  --page-pad-x: 40px;
  --page-pad-y: 32px;
}

/* ============================================================
   Semantic typography classes
   ============================================================ */
.ds-hero {
  font-family: var(--font-sans);
  font-size: var(--fs-hero);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-display {
  font-family: var(--font-sans);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-h3);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-600);
}
.ds-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-500);
}
.ds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--ink-700);
  font-feature-settings: "tnum" 1;
}
.ds-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

.ds-reset, .ds-reset * { box-sizing: border-box; }
.ds-reset {
  font-family: var(--font-sans);
  color: var(--ink-600);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   OKR LENS Responsive — 2026 리브랜드
   ============================================================ */
* { box-sizing: border-box; }
html, body { max-width: 100%; overflow-x: auto; }
body { font-size: 16px; }

.okrlens-sidebar,
aside[class*="Sidebar"] {
  transition: width 220ms cubic-bezier(.16,1,.3,1);
}
@media (max-width: 1024px) {
  .okrlens-sidebar { width: 76px !important; min-width: 76px !important; padding-left: 10px !important; padding-right: 10px !important; }
  .okrlens-sidebar > div:first-child > span:not(:first-child),
  .okrlens-sidebar > div:first-child > span:last-child { display: none !important; }
  .okrlens-sidebar > div:first-child { justify-content: center !important; padding: 4px 0 22px !important; }
  .okrlens-sidebar a > div span:last-child,
  .okrlens-sidebar > div > div:last-child > div:last-child { display: none !important; }
  .okrlens-sidebar a > div,
  .okrlens-sidebar > div > div {
    justify-content: center !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}
@media (max-width: 900px) {
  .okrlens-sidebar { width: 72px !important; min-width: 72px !important; padding-left: 8px !important; padding-right: 8px !important; }
}
@media (max-width: 640px) {
  .okrlens-sidebar { position: fixed; z-index: 100; height: 100vh; transform: translateX(-100%); }
  .okrlens-sidebar.open { transform: translateX(0); }
  #app > div > div:last-child,
  main { padding-left: 12px !important; padding-right: 12px !important; }
}

main, [class*="page-content"] {
  padding-left: clamp(16px, 3vw, 40px);
  padding-right: clamp(16px, 3vw, 40px);
}

@media (max-width: 900px) {
  [style*="gridTemplateColumns"][style*="1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
@media (max-width: 640px) {
  [style*="repeat(3, 1fr)"],
  [style*="repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="gap: 56px"], [style*="gap:56px"] { gap: 24px !important; }
  [style*="gap: 40px"], [style*="gap:40px"] { gap: 20px !important; }
}

.okrlens-topbar {
  flex-wrap: wrap;
  gap: 12px !important;
  padding: 12px 20px !important;
}
@media (max-width: 900px) {
  .okrlens-search { width: 100% !important; order: 10; }
  .okrlens-period { display: none !important; }
}

body, .ds-body { font-size: 16px; }
h1, .ds-h1 { font-size: clamp(22px, 3vw, 28px); }
h2, .ds-h2 { font-size: clamp(19px, 2.4vw, 22px); }


</style>

function Icon({ name, size = 18, strokeWidth = 1.75, style = {}, ...rest }) {
  const path = ICONS[name];
  if (!path) return null;
  return (
    <svg
      viewBox="0 0 24 24"
      width={size}
      height={size}
      fill="none"
      stroke="currentColor"
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}
      {...rest}
    >
      {path}
    </svg>
  );
}

<script type="text/babel">function Button({ variant = "primary", size = "md", children, leftIcon, rightIcon, onClick, disabled }) {
  const base = {
    fontFamily: "var(--font-sans)",
    fontWeight: 600,
    borderRadius: 10,
    border: "1px solid transparent",
    cursor: disabled ? "not-allowed" : "pointer",
    display: "inline-flex",
    alignItems: "center",
    gap: 7,
    lineHeight: 1,
    letterSpacing: "-0.005em",
    transition: "background 140ms ease-out, border-color 140ms ease-out, box-shadow 140ms ease-out",
    opacity: disabled ? 0.42 : 1,
  };
  const sizes = {
    sm: { fontSize: 12.5, padding: "7px 12px" },
    md: { fontSize: 13.5, padding: "10px 16px" },
    lg: { fontSize: 15, padding: "12px 22px" },
  };
  const variants = {
    primary:   { background: "#3B5BDB", color: "#fff", boxShadow: "0 1px 2px rgba(31,42,74,.08)" },
    secondary: { background: "#fff", color: "#1F2A4A", borderColor: "#C8CFDF" },
    ghost:     { background: "transparent", color: "#3A4565" },
    danger:    { background: "#fff", color: "#D14343", borderColor: "#FFD4D4" },
    success:   { background: "#2F9E5E", color: "#fff" },
    ai:        { background: "#F1F4FD", color: "#213A8C", borderColor: "#C5D0F7" },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyles = {
    primary:   { background: "#2C49B8" },
    secondary: { background: "#F4F7FB" },
    ghost:     { background: "#F4F7FB" },
    danger:    { background: "#FFF0F0" },
    success:   { background: "#268F52" },
    ai:        { background: "#E5EBFB" },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}) }}
    >
      {leftIcon}
      {children}
      {rightIcon}
    </button>
  );
}
window.Button = Button;
</script>

                  <div style={{ flex: 1, fontSize: 12.5, color: "#1F2A4A" }}>위반 ≥ <CriteriaNumberField label="" value="2" unit="건"/> → 위험도 "중"</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: "#FDECEC", border: "1px solid #F5C0C0", borderRadius: 10 }}>
                  <span style={{ width: 44, fontSize: 12, fontWeight: 700, color: "#D14343", textAlign: "center" }}>상</span>
                  <div style={{ flex: 1, fontSize: 12.5, color: "#1F2A4A" }}>위반 ≥ <CriteriaNumberField label="" value="4" unit="건"/> → 위험도 "상"</div>
                </div>
              </div>
            </div>

            {/* 점수 상한 / KR 개수 */}
            <div style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12, padding: "20px 22px" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#0F1A36", marginBottom: 4 }}>점수 상한 & KR 개수 범위</div>
              <div style={{ fontSize: 12, color: "#7C87A4", marginBottom: 16 }}>달성률 상한과 KR 작성 수 제약</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <CriteriaNumberField label="KR 점수 상한" value="110" unit="%" color="#3B5BDB" hint="달성률 130%여도 110%까지만 점수에 반영"/>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <CriteriaNumberField label="KR 최소 개수" value="4" unit="개"/>
                  <CriteriaNumberField label="KR 최대 개수" value="6" unit="개"/>
                </div>
                <div style={{ padding: "10px 12px", background: "#F1F4FD", border: "1px solid #C5D0F7", borderRadius: 8, fontSize: 11.5, color: "#1B2A4E", lineHeight: 1.55 }}>
                  💡 KR 4~6개를 권장. 3개 이하는 R1 작성 시 경고가 표시돼요.
                </div>
              </div>
            </div>
          </div>
        )}

        {tab === "distrib" && (
          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 18 }}>
            <div style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12, padding: "20px 22px" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#0F1A36", marginBottom: 4 }}>등급 강제배분 비율</div>
              <div style={{ fontSize: 12, color: "#7C87A4", marginBottom: 16 }}>S/A/B/C/D 강제배분 — D는 규정(현저한 미달성) 수동 배정</div>
              <div style={{ display: "flex", height: 48, borderRadius: 10, overflow: "hidden", border: "1px solid #E1E5EF", marginBottom: 16 }}>
                <div style={{ width: "5%", background: "#7C4DD9", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700 }}>S 5%</div>
                <div style={{ width: "10%", background: "#3B5BDB", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700 }}>A 10%</div>
                <div style={{ width: "75%", background: "#2F9E5E", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700 }}>B 75%</div>
                <div style={{ width: "10%", background: "#D98023", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)", fontSize: 13, fontWeight: 700 }}>C 10%</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10 }}>
                {[{g:"S",v:5,c:"#7C4DD9"},{g:"A",v:10,c:"#3B5BDB"},{g:"B",v:75,c:"#2F9E5E"},{g:"C",v:10,c:"#D98023"},{g:"D",v:null,c:"#D14343"}].map(g => (
                  <CriteriaNumberField key={g.g} label={`${g.g}등급`} value={g.v ?? "—"} unit="%" color={g.c} hint={g.v == null ? "수동 배정" : ""}/>
                ))}
              </div>
            </div>
            <div style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12, padding: "20px 22px" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#0F1A36", marginBottom: 4 }}>난이도 가중치</div>
              <div style={{ fontSize: 12, color: "#7C87A4", marginBottom: 16 }}>KR 난이도별 점수 가중치</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { lvl:"상", w:1.2, c:"#D14343", bg:"#FDECEC" },
                  { lvl:"중", w:1.0, c:"#D98023", bg:"#FFF7EC" },
                  { lvl:"하", w:0.8, c:"#2F9E5E", bg:"#ECFAF1" },
                ].map((r) => (
                  <div key={r.lvl} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: r.bg, borderRadius: 10 }}>
                    <span style={{ width: 50, padding: "4px 10px", borderRadius: 999, background: "#fff", color: r.c, fontSize: 12, fontWeight: 700, textAlign: "center" }}>{r.lvl}</span>
                    <CriteriaNumberField label="" value={r.w} unit="배"/>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === "taxonomy" && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#0F1A36", marginBottom: 4 }}>Taxonomy · 분류 체계</div>
            <div style={{ fontSize: 12, color: "#7C87A4", marginBottom: 16 }}>업무군 9 · BSC 10 · KR 유형 4 · 위험 유형 11 · 직렬 4</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
              {[
                { title: "업무군 (9)", items: ["개발/요건", "데이터/정합성", "자동화", "성능/튜닝", "장애/운영안정", "정시/납기/처리율", "매뉴얼/표준/문서", "보안/권한/개인정보", "고객/사업기여/제안"], color: "#3B5BDB" },
                { title: "BSC 카테고리 (10)", items: ["재무", "고객", "프로세스", "품질", "생산성", "조직/인재", "시스템 운영", "리스크", "프로젝트", "기타"], color: "#7C4DD9" },
                { title: "KR 유형 (4)", items: ["마일스톤", "수치", "루브릭", "이산"], color: "#E07A3C" },
                { title: "직렬 (4)", items: ["SE — System Engineer", "PM — Project Manager", "SI — System Integrator", "SM — Service Manager"], color: "#2F9E5E" },
              ].map((t, i) => (
                <div key={i} style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12, padding: "18px 20px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: "#0F1A36" }}>{t.title}</div>
                    <span style={{ padding: "3px 9px", borderRadius: 999, background: `${t.color}15`, color: t.color, fontSize: 11, fontWeight: 700 }}>{t.items.length}개</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {t.items.map((it, ii) => (
                      <span key={ii} style={{ padding: "5px 11px", borderRadius: 7, background: "#F9FAFC", border: "1px solid #ECEFF5", fontSize: 11.5, color: "#1F2A4A", fontFamily: it.includes("—") ? "var(--font-mono)" : "var(--font-sans)" }}>{it}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "guides" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
            {[
              { type: "운영", color: "#3B5BDB", bg: "#E5EBFB", desc: "기존 업무 효율·품질 개선", weight: "40%", samples: ["응답속도 p95 < 800ms 유지", "장애 평균복구시간 < 30분", "월 단위 리포트 정확도 99% 이상"] },
              { type: "전략혁신", color: "#7C4DD9", bg: "#F0E9FB", desc: "신규 가치 창출·도전적 변화", weight: "40%", samples: ["신규 셀프서비스 채널 런칭", "AI 추천 시스템 적용 매출 +15%", "데이터 거버넌스 체계 0→1 수립"] },
            ].map((g, i) => (
              <div key={i} style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12, padding: "20px 22px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                  <span style={{ padding: "5px 12px", borderRadius: 8, background: g.bg, color: g.color, fontSize: 13, fontWeight: 700 }}>{g.type}</span>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "#7C87A4" }}>비중 {g.weight}</span>
                </div>
                <div style={{ fontSize: 12.5, color: "#5B6685", marginBottom: 14, lineHeight: 1.5 }}>{g.desc}</div>
                <div style={{ fontSize: 11.5, fontWeight: 700, color: "#1F2A4A", marginBottom: 8 }}>R1 작성 예시 (가이드 노출)</div>
                <textarea
                  defaultValue={g.samples.map(s => `· ${s}`).join("\n")}
                  style={{ width: "100%", minHeight: 110, padding: "10px 12px", background: "#F9FAFC", border: "1px solid #E1E5EF", borderRadius: 9, fontFamily: "var(--font-sans)", fontSize: 12, color: "#0F1A36", outline: "none", resize: "vertical", lineHeight: 1.6 }}
                />
              </div>
            ))}
          </div>
        )}

        {tab === "checklist" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 20 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#0F1A36" }}>11항목 체크리스트</div>
                  <div style={{ fontSize: 12, color: "#7C87A4", marginTop: 3 }}>R2 평가자의 AI Validation은 이 11개 문항을 자동 판정해요.</div>
                </div>
                <div style={{ flex: 1 }}/>
                <Button variant="ai" size="sm" leftIcon={<span>+</span>}>항목 추가</Button>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                <ChecklistRow no={1} text="수치로 측정 가능한가?" tag="측정모호"/>
                <ChecklistRow no={2} text="외부 의존 없이 통제 가능한가?" tag="통제불가"/>
                <ChecklistRow no={3} text="유지형이 아닌 도전적 목표인가?" tag="도전성저하"/>
                <ChecklistRow no={4} text="시간 내 현실적으로 달성 가능한가?" tag="현실성낮음"/>
                <ChecklistRow no={5} text="명확한 언어인가? (애매한 표현이 없는가)" tag="표현모호" edited/>
                <ChecklistRow no={6} text="타 팀 KR과 겹치지 않는가?" tag="공모형"/>
                <ChecklistRow no={7} text="신기술/새 도구에 과의존하지 않는가?" tag="신기술의존"/>
                <ChecklistRow no={8} text="단순 건수형이 아닌 질적 지표인가?" tag="건수형지표"/>
                <ChecklistRow no={9} text="평가자가 확인 가능한 증거가 있는가?" tag="확인불가"/>
                <ChecklistRow no={10} text="외부 증빙 기반인가? (자기보고 아님)" tag="자기보고형" edited/>
                <ChecklistRow no={11} text="고위험 실행 요소가 통제되는가?" tag="고위험실행"/>
              </div>
            </div>

            {/* Side - KR 개수만 */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#0F1A36" }}>KR 개수 범위</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <CriteriaNumberField label="최소" value="4" unit="개"/>
                <CriteriaNumberField label="최대" value="6" unit="개"/>
              </div>

              <div style={{ fontSize: 13, fontWeight: 700, color: "#0F1A36", marginTop: 6 }}>위험 태그 미리보기</div>
              <div style={{ padding: "12px 14px", background: "#F9FAFC", border: "1px solid #ECEFF5", borderRadius: 10, fontSize: 11.5, color: "#5B6685", lineHeight: 1.6 }}>
                각 체크리스트 항목 위반 시 위험 태그가 KR에 자동 부착돼요. 평가자가 검토 시 태그를 확인하고 코칭 후보로 분류합니다.
              </div>

              {/* Recent changes */}
              <div style={{ background: "#FFF7EC", border: "1px solid #FFE0BA", borderRadius: 12, padding: "14px 16px", marginTop: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#7A4A14", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>✏️</span> 저장되지 않은 변경 2건
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 11.5, color: "#9C5E26", lineHeight: 1.5 }}>
                  <div>· 항목 05 문구 수정</div>
                  <div>· 항목 10 문구 수정</div>
                </div>
              </div>
            </div>
          </div>
        )}

      </div>
    </main>
  );
}

window.R3Criteria = R3Criteria;
</script>

  function App() { return (<><SidebarR3 active="criteria"/><R3Criteria/></>); }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
