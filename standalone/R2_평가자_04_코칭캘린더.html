<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OKR LENS — 코칭 캘린더</title>
<style>/* ============================================================
   OKR LENS — Design System
   colors_and_type.css
   사내 OKR 평가·코칭 AI 서비스 — 친근한 SaaS 톤 · 넉넉한 여백
   ============================================================ */

/* ---------- 1. Fonts ---------- */
@font-face {
  font-family: 'Pretendard';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Medium.woff2') format('woff2');
}

:root {
  /* ---------- 2. Color — Brand / Primary (Friendly Blue) ---------- */
  /* 참고 이미지의 SSO 버튼/CTA 컬러에서 추출. 인디고가 아닌 더 밝은 'Friendly Blue'. */
  --brand-900: #142250;   /* deepest — text accent on light bg */
  --brand-800: #1B2A4E;   /* dark navy — sidebar, hero text accent (참고 이미지 좌측 다크 카드) */
  --brand-700: #213A8C;
  --brand-600: #2C49B8;
  --brand-500: #3B5BDB;   /* PRIMARY — SSO 버튼 컬러 */
  --brand-400: #5C7AE6;
  --brand-300: #91A6F0;
  --brand-200: #C5D0F7;
  --brand-100: #E5EBFB;
  --brand-50:  #F1F4FD;

  /* ---------- 3. Role Accents (3역할 컬러 코딩) ---------- */
  /* 참고 이미지: 피평가자=블루, 평가자=그린, 인사담당자=오렌지/코랄 */
  --role-r1-bg:   #E8F0FF;
  --role-r1-fg:   #3B5BDB;
  --role-r1-mark: #3B5BDB;

  --role-r2-bg:   #E3F4EA;
  --role-r2-fg:   #2F9E5E;
  --role-r2-mark: #2F9E5E;

  --role-r3-bg:   #FFEDE2;
  --role-r3-fg:   #E07A3C;
  --role-r3-mark: #E07A3C;

  /* ---------- 4. Color — Neutrals (Cool Slate, softer than v1) ---------- */
  --ink-900: #0F1A36;     /* heading */
  --ink-800: #1F2A4A;
  --ink-700: #3A4565;     /* body strong */
  --ink-600: #5B6685;     /* body */
  --ink-500: #7C87A4;     /* secondary */
  --ink-400: #A4ADC4;     /* tertiary, icon */
  --ink-300: #C8CFDF;     /* disabled */
  --ink-200: #E1E5EF;     /* divider */
  --ink-150: #ECEFF5;
  --ink-100: #F4F7FB;     /* PAGE BACKGROUND — 참고 이미지 베이스 */
  --ink-50:  #F9FAFC;
  --ink-0:   #FFFFFF;

  /* ---------- 5. Color — Semantic (Status) ---------- */
  /* 친근한 톤 — 채도 더 낮춤. "코칭" 시선 유지. */
  --risk-high-fg:   #D14343;
  --risk-high-bg:   #FFF0F0;
  --risk-high-bd:   #FFD4D4;

  --risk-mid-fg:    #D98023;
  --risk-mid-bg:    #FFF7EC;
  --risk-mid-bd:    #FFE0BA;

  --risk-low-fg:    #2F9E5E;
  --risk-low-bg:    #ECFAF1;
  --risk-low-bd:    #BBE9CC;

  --info-fg:        #2B5DD9;
  --info-bg:        #EFF4FE;
  --info-bd:        #C5D5F7;

  /* ---------- 6. Status — 승인 enum (D5) ---------- */
  --status-draft-fg:    #5B6685;
  --status-draft-bg:    #F1F3F8;
  --status-pending-fg:  #2B5DD9;
  --status-pending-bg:  #EFF4FE;
  --status-approved-fg: #2F9E5E;
  --status-approved-bg: #ECFAF1;
  --status-rejected-fg: #D14343;
  --status-rejected-bg: #FFF0F0;
  --status-adjust-fg:   #D98023;
  --status-adjust-bg:   #FFF7EC;

  /* ---------- 7. Difficulty / Grade ---------- */
  --diff-high: #7C4DD9;
  --diff-mid:  #3B5BDB;
  --diff-low:  #7C87A4;

  --grade-s: #6B47E0;
  --grade-a: #3B5BDB;
  --grade-b: #2F9E5E;
  --grade-c: #D98023;
  --grade-d: #7C87A4;

  /* ---------- 8. Data viz / Heatmap ---------- */
  --heat-0: #F1F4FD;
  --heat-1: #DCE3F8;
  --heat-2: #B7C4F0;
  --heat-3: #8FA1E5;
  --heat-4: #5C7AE6;
  --heat-5: #3B5BDB;

  /* ---------- 9. Typography — Stacks ---------- */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular,
               'SF Mono', Consolas, 'Liberation Mono', monospace;

  /* ---------- 10. Type — Sizes & line-heights ---------- */
  /* base 15px — 참고 이미지의 넉넉한 밀도에 맞춰 한 단계 키움 */
  --fs-hero:     48px;   /* 랜딩 메인 헤드라인 */
  --fs-display:  36px;
  --fs-h1:       28px;
  --fs-h2:       22px;
  --fs-h3:       18px;
  --fs-body-lg:  16px;
  --fs-body:     15px;   /* body default */
  --fs-sm:       13.5px;
  --fs-xs:       12.5px;
  --fs-micro:    11.5px;

  --lh-tight:    1.25;
  --lh-snug:     1.45;
  --lh-normal:   1.7;
  --lh-relaxed:  1.85;

  --tracking-tight:  -0.025em;
  --tracking-normal: -0.005em;
  --tracking-wide:   0.04em;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* ---------- 11. Spacing scale (4pt grid) ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;
  --sp-11: 80px;
  --sp-12: 96px;

  /* ---------- 12. Radius — 더 부드럽게 ---------- */
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;    /* 기본 카드 */
  --radius-xl: 20px;    /* 큰 카드, 패널 */
  --radius-2xl: 28px;   /* 히어로 일러스트 박스 */
  --radius-pill: 999px;

  /* ---------- 13. Shadow / Elevation — 부드럽고 옅음 ---------- */
  --shadow-xs: 0 1px 2px rgba(31, 42, 74, 0.04);
  --shadow-sm: 0 2px 6px rgba(31, 42, 74, 0.05);
  --shadow-md: 0 6px 16px -4px rgba(31, 42, 74, 0.08);
  --shadow-lg: 0 16px 40px -10px rgba(31, 42, 74, 0.10);
  --shadow-xl: 0 30px 60px -16px rgba(31, 42, 74, 0.16);
  --shadow-focus: 0 0 0 4px rgba(59, 91, 219, 0.16);
  --shadow-card-hover: 0 12px 28px -8px rgba(59, 91, 219, 0.18);

  /* ---------- 14. Borders ---------- */
  --bd-subtle: 1px solid var(--ink-150);
  --bd-default: 1px solid var(--ink-200);
  --bd-strong: 1px solid var(--ink-300);
  --bd-focus: 1.5px solid var(--brand-500);

  /* ---------- 15. Motion ---------- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 320ms;

  /* ---------- 16. Layout ---------- */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --content-max: 1440px;
  --page-pad-x: 40px;
  --page-pad-y: 32px;
}

/* ============================================================
   Semantic typography classes
   ============================================================ */
.ds-hero {
  font-family: var(--font-sans);
  font-size: var(--fs-hero);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-display {
  font-family: var(--font-sans);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-h3);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-600);
}
.ds-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-500);
}
.ds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--ink-700);
  font-feature-settings: "tnum" 1;
}
.ds-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

.ds-reset, .ds-reset * { box-sizing: border-box; }
.ds-reset {
  font-family: var(--font-sans);
  color: var(--ink-600);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   OKR LENS Responsive — 2026 리브랜드
   ============================================================ */
* { box-sizing: border-box; }
html, body { max-width: 100%; overflow-x: auto; }
body { font-size: 16px; }

.okrlens-sidebar,
aside[class*="Sidebar"] {
  transition: width 220ms cubic-bezier(.16,1,.3,1);
}
@media (max-width: 1024px) {
  .okrlens-sidebar { width: 76px !important; min-width: 76px !important; padding-left: 10px !important; padding-right: 10px !important; }
  .okrlens-sidebar > div:first-child > span:not(:first-child),
  .okrlens-sidebar > div:first-child > span:last-child { display: none !important; }
  .okrlens-sidebar > div:first-child { justify-content: center !important; padding: 4px 0 22px !important; }
  .okrlens-sidebar a > div span:last-child,
  .okrlens-sidebar > div > div:last-child > div:last-child { display: none !important; }
  .okrlens-sidebar a > div,
  .okrlens-sidebar > div > div {
    justify-content: center !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}
@media (max-width: 900px) {
  .okrlens-sidebar { width: 72px !important; min-width: 72px !important; padding-left: 8px !important; padding-right: 8px !important; }
}
@media (max-width: 640px) {
  .okrlens-sidebar { position: fixed; z-index: 100; height: 100vh; transform: translateX(-100%); }
  .okrlens-sidebar.open { transform: translateX(0); }
  #app > div > div:last-child,
  main { padding-left: 12px !important; padding-right: 12px !important; }
}

main, [class*="page-content"] {
  padding-left: clamp(16px, 3vw, 40px);
  padding-right: clamp(16px, 3vw, 40px);
}

@media (max-width: 900px) {
  [style*="gridTemplateColumns"][style*="1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
@media (max-width: 640px) {
  [style*="repeat(3, 1fr)"],
  [style*="repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="gap: 56px"], [style*="gap:56px"] { gap: 24px !important; }
  [style*="gap: 40px"], [style*="gap:40px"] { gap: 20px !important; }
}

.okrlens-topbar {
  flex-wrap: wrap;
  gap: 12px !important;
  padding: 12px 20px !important;
}
@media (max-width: 900px) {
  .okrlens-search { width: 100% !important; order: 10; }
  .okrlens-period { display: none !important; }
}

body, .ds-body { font-size: 16px; }
h1, .ds-h1 { font-size: clamp(22px, 3vw, 28px); }
h2, .ds-h2 { font-size: clamp(19px, 2.4vw, 22px); }

<script type="text/babel">function Button({ variant = "primary", size = "md", children, leftIcon, rightIcon, onClick, disabled }) {
  const base = {
    fontFamily: "var(--font-sans)",
    fontWeight: 600,
    borderRadius: 10,
    border: "1px solid transparent",
    cursor: disabled ? "not-allowed" : "pointer",
    display: "inline-flex",
    alignItems: "center",
    gap: 7,
    lineHeight: 1,
    letterSpacing: "-0.005em",
    transition: "background 140ms ease-out, border-color 140ms ease-out, box-shadow 140ms ease-out",
    opacity: disabled ? 0.42 : 1,
  };
  const sizes = {
    sm: { fontSize: 12.5, padding: "7px 12px" },
    md: { fontSize: 13.5, padding: "10px 16px" },
    lg: { fontSize: 15, padding: "12px 22px" },
  };
  const variants = {
    primary:   { background: "#3B5BDB", color: "#fff", boxShadow: "0 1px 2px rgba(31,42,74,.08)" },
    secondary: { background: "#fff", color: "#1F2A4A", borderColor: "#C8CFDF" },
    ghost:     { background: "transparent", color: "#3A4565" },
    danger:    { background: "#fff", color: "#D14343", borderColor: "#FFD4D4" },
    success:   { background: "#2F9E5E", color: "#fff" },
    ai:        { background: "#F1F4FD", color: "#213A8C", borderColor: "#C5D0F7" },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyles = {
    primary:   { background: "#2C49B8" },
    secondary: { background: "#F4F7FB" },
    ghost:     { background: "#F4F7FB" },
    danger:    { background: "#FFF0F0" },
    success:   { background: "#268F52" },
    ai:        { background: "#E5EBFB" },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}) }}
    >
      {leftIcon}
      {children}
      {rightIcon}
    </button>
  );
}
window.Button = Button;
</script>

          {/* 시간 */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            <div>
              <label style={fieldLabel}>시작 시간 <span style={{ color: "#D14343" }}>*</span></label>
              <select value={start} onChange={(e) => setStart(e.target.value)} style={selectStyle}>

              </select>
            </div>
            <div>
              <label style={fieldLabel}>종료 시간</label>
              <select value={end} onChange={(e) => setEnd(e.target.value)} style={selectStyle}>
                {times.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>

          {/* 참여자 (공지가 아닐 때만) */}
          {showParticipants && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <label style={{ ...fieldLabel, margin: 0 }}>참여자 <span style={{ color: "#A4ADC4", fontWeight: 500 }}>(선택)</span></label>
                <button onClick={() => setParticipants(allMembers.map(m => m.id))} style={smallBtn}>전체 선택</button>
                <button onClick={() => setParticipants([])} style={smallBtn}>전체 해제</button>
                <span style={{ marginLeft: "auto", fontSize: 11, color: "#5B6685", fontFamily: "var(--font-mono)" }}>{participants.length}명 선택</span>
              </div>
              <div style={{
                border: "1px solid #E1E5EF", borderRadius: 9, padding: 8,
                maxHeight: 130, overflowY: "auto",
                display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4,
                background: "#fff",
              }}>
                {allMembers.map(m => {
                  const checked = participants.includes(m.id);
                  return (
                    <label key={m.id} style={{
                      display: "flex", alignItems: "center", gap: 6,
                      padding: "5px 6px", borderRadius: 6, cursor: "pointer",
                      fontSize: 12, color: "#3A4565",
                      background: checked ? "#F1F4FD" : "transparent",
                    }}>
                      <input type="checkbox" checked={checked} onChange={() => toggleParticipant(m.id)}
                        style={{ accentColor: "#3B5BDB" }}/>
                      <span style={{ display: "flex", alignItems: "center", gap: 3, minWidth: 0 }}>
                        {m.focus && <span style={{ fontSize: 10 }}>🎯</span>}
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.name}</span>
                      </span>
                    </label>
                  );
                })}
              </div>
              {type === "oneonone" && participants.length === 0 && (
                <div style={{ fontSize: 11, color: "#D98023", marginTop: 5, display: "flex", alignItems: "center", gap: 4 }}>
                  💡 1on1 코칭은 팀원 1명 선택을 권장해요.
                </div>
              )}
            </div>
          )}

          {/* 메모 */}
          <div>
            <label style={fieldLabel}>메모 <span style={{ color: "#A4ADC4", fontWeight: 500 }}>(선택, 최대 200자)</span></label>
            <textarea value={memo} onChange={(e) => setMemo(e.target.value.slice(0, 200))} placeholder="예: KR 03 진척 점검 + 다음 분기 도전성 협의"
              style={{
                width: "100%", minHeight: 60, padding: "9px 11px",
                background: "#fff", border: "1px solid #E1E5EF", borderRadius: 9,
                fontFamily: "var(--font-sans)", fontSize: 12.5, color: "#0F1A36",
                outline: "none", resize: "vertical", lineHeight: 1.55,
              }}/>

          </div>
        </div>

        <div style={{ padding: "14px 24px", borderTop: "1px solid #ECEFF5", display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <Button variant="secondary" onClick={onClose}>취소</Button>
          <Button variant="primary" onClick={() => { onSave && onSave({ type, start, end, participants, memo }); onClose(); }}>저장</Button>
        </div>
      </div>
    </div>
  );
}

function EventPopover({ event, anchor, onClose, onEdit }) {
  if (!event || !anchor) return null;
  const types = window.OKRDummy.scheduleTypes;
  const t = types[event.type];
  const rect = anchor.getBoundingClientRect();
  const top = rect.bottom + 6;
  const left = Math.min(rect.left, window.innerWidth - 280);

  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 40 }}/>
      <div style={{
        position: "fixed", top, left, width: 260, zIndex: 41,
        background: "#fff", border: "1px solid #E1E5EF", borderRadius: 12,
        boxShadow: "0 12px 32px -6px rgba(15,26,54,.20)", padding: 14,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: t.bg, color: t.fg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{t.ico}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#0F1A36" }}>{event.title}</div>
            <div style={{ fontSize: 11, color: "#7C87A4" }}>{t.label}</div>
          </div>
          {event.focus && <span style={{ fontSize: 12 }}>🎯</span>}
        </div>
        <div style={{ fontSize: 11.5, color: "#5B6685", lineHeight: 1.55, marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #ECEFF5" }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 3 }}>
            <span style={{ color: "#A4ADC4", width: 50 }}>시간</span>
            <span style={{ color: "#0F1A36", fontFamily: "var(--font-mono)", fontWeight: 600 }}>{event.time}</span>
          </div>
          {event.participants && (
            <div style={{ display: "flex", gap: 6, marginBottom: 3 }}>
              <span style={{ color: "#A4ADC4", width: 50 }}>참여자</span>
              <span style={{ color: "#0F1A36" }}>{event.participants}</span>
            </div>
          )}
          {event.memo && (
            <div style={{ display: "flex", gap: 6 }}>
              <span style={{ color: "#A4ADC4", width: 50 }}>메모</span>
              <span style={{ color: "#3A4565", flex: 1 }}>{event.memo}</span>
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => { onEdit && onEdit(); onClose(); }} style={{
            flex: 1, padding: "6px 10px", background: "#F4F7FB", border: "1px solid #E1E5EF",
            borderRadius: 7, fontSize: 11.5, color: "#3A4565", fontWeight: 600, cursor: "pointer",
            fontFamily: "var(--font-sans)",
          }}>수정</button>
          <button style={{
            flex: 1, padding: "6px 10px", background: "#fff", border: "1px solid #FFD4D4",
            borderRadius: 7, fontSize: 11.5, color: "#D14343", fontWeight: 600, cursor: "pointer",
            fontFamily: "var(--font-sans)",
          }}>삭제</button>
        </div>
      </div>
    </>
  );
}

function FullCalendar({ onDayClick, onChipClick }) {
  const types = window.OKRDummy.scheduleTypes;

  // 2026년 6월 — 1일 = 월요일
  // 이벤트 데이터 (날짜 = 일자)
  const events = {
    3:  [{ type: "kickoff",  title: "OKR 등록 시작", time: "전일",  focus: false }],
    9:  [{ type: "oneonone", title: "1on1 — 김태양", time: "14:00", focus: true,  participants: "김태양", memo: "KR 01 진척 점검" }],
    10: [{ type: "quarter",  title: "분기 미팅",     time: "10:00", focus: false, participants: "팀 전체 20명", memo: "2분기 목표 공유·조정" }],
    12: [{ type: "oneonone", title: "1on1 — 강동우", time: "10:00", focus: true,  participants: "강동우", memo: "재상신 KR 함께 검토" }],
    15: [{ type: "quarter",  title: "분기 중간 점검", time: "14:00", focus: false }],
    17: [{ type: "oneonone", title: "1on1 — 임재현", time: "15:00", focus: false }],
    18: [{ type: "etc",      title: "팀 간담회",     time: "15:00", focus: false, memo: "분기 회고 및 친목" }],
    22: [{ type: "oneonone", title: "1on1 — 박서연", time: "10:30", focus: true }, { type: "oneonone", title: "1on1 — 한지윤", time: "14:00", focus: true }],
    25: [{ type: "oneonone", title: "1on1 — 정하은", time: "11:00", focus: true }],
    30: [{ type: "deadline", title: "OKR 등록 마감", time: "18:00", focus: false }],
  };

  // 2026-06-01 = 월요일
  const firstOffset = 1; // 월=1
  const total = 30;
  const cells = [];
  for (let i = 0; i < firstOffset; i++) cells.push(null);
  for (let i = 1; i <= total; i++) cells.push(i);
  while (cells.length % 7 !== 0) cells.push(null);

  const TODAY = 12; // 데모 — 오늘은 6/12

  return (
    <div style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 14, padding: "20px 22px", boxShadow: "0 1px 2px rgba(31,42,74,.04)" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#0F1A36", letterSpacing: "-0.015em" }}>2026 · 06월</div>
          <div style={{ fontSize: 11.5, color: "#7C87A4", marginTop: 2 }}>등록 일정 12건 · 1on1 6건 · 분기 미팅 2건</div>
        </div>
        <div style={{ flex: 1 }}/>
        <div style={{ display: "flex", gap: 4 }}>
          <button style={navBtn}>‹</button>
          <button style={{ ...navBtn, width: "auto", padding: "0 12px", fontSize: 12, fontWeight: 600 }}>오늘</button>
          <button style={navBtn}>›</button>
        </div>
      </div>

      {/* Day headers */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
        {["월","화","수","목","금","토","일"].map((d, i) => (
          <div key={i} style={{
            fontSize: 10.5, fontWeight: 700,
            color: i === 5 ? "#2B5DD9" : i === 6 ? "#D14343" : "#7C87A4",
            textAlign: "center", padding: "8px 0",
            letterSpacing: "0.04em", textTransform: "uppercase",
          }}>{d}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{ minHeight: 88, background: "#F9FAFC", borderRadius: 8, opacity: 0.4 }}/>;
          const ev = events[d];
          const isToday = d === TODAY;
          const dow = (firstOffset + d - 1) % 7;
          const dateColor = dow === 6 ? "#D14343" : dow === 5 ? "#2B5DD9" : "#3A4565";
          return (
            <div key={i}
              onClick={() => onDayClick && onDayClick(d, ev)}
              style={{
                minHeight: 88,
                background: isToday ? "#F1F4FD" : "#fff",
                border: `1px solid ${isToday ? "#3B5BDB" : "#ECEFF5"}`,
                borderRadius: 8, padding: "5px 6px",
                overflow: "hidden",
                display: "flex", flexDirection: "column",
                cursor: "pointer",
                transition: "background 140ms",
              }}
              onMouseEnter={(e) => { if (!isToday) e.currentTarget.style.background = "#F9FAFC"; }}
              onMouseLeave={(e) => { if (!isToday) e.currentTarget.style.background = "#fff"; }}
            >
              <div style={{
                fontSize: 11.5, fontWeight: isToday ? 700 : 600,
                color: isToday ? "#3B5BDB" : dateColor,
                fontVariantNumeric: "tabular-nums",
                marginBottom: 3,
                display: "flex", alignItems: "center", gap: 4,
              }}>
                {d}
                {isToday && <span style={{ fontSize: 8.5, padding: "1px 5px", background: "#3B5BDB", color: "#fff", borderRadius: 3 }}>오늘</span>}
              </div>
              {ev && ev.slice(0, 3).map((e, j) => {
                const c = types[e.type];
                return (
                  <div key={j}
                    onClick={(ev2) => { ev2.stopPropagation(); onChipClick && onChipClick(e, ev2.currentTarget); }}
                    style={{
                      background: c.bg, color: c.fg,
                      fontSize: 9.5, fontWeight: 600,
                      padding: "2px 5px", borderRadius: 4, marginBottom: 2,
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                      lineHeight: 1.4, cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 3,
                  }} title={`${e.time} ${e.title}`}>
                    <span style={{ fontSize: 9 }}>{c.ico}</span>
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{e.title}</span>
                    {e.focus && <span style={{ width: 4, height: 4, borderRadius: "50%", background: c.fg, marginLeft: "auto", flexShrink: 0 }}/>}
                  </div>
                );
              })}
              {ev && ev.length > 3 && <div style={{ fontSize: 9, color: "#7C87A4", fontWeight: 600 }}>+{ev.length - 3}</div>}
            </div>
          );
        })}
      </div>

      {/* Legend — 6종 명세 */}
      <div style={{ display: "flex", gap: 14, marginTop: 14, paddingTop: 12, borderTop: "1px solid #ECEFF5", flexWrap: "wrap", fontSize: 11, color: "#5B6685" }}>
        {Object.entries(types).map(([k, t]) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: t.fg }}/>
            <span style={{ fontSize: 11 }}>{t.ico}</span>
            <span>{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#0F1A36" }}>{m.name} <span style={{ color: "#7C87A4", fontWeight: 500, fontSize: 11 }}>{m.grade}</span></div>
              <div style={{ fontSize: 10, color: "#9C5E26" }}>{m.group}</div>
            </div>
            <span style={{ padding: "3px 8px", background: "#D98023", border: "none", borderRadius: 6, color: "#fff", fontSize: 10, fontWeight: 700, fontFamily: "var(--font-sans)" }}>+ 1on1</span>
          </div>
        ))}
      </div>

      {others.length > 0 && (
        <>
          <div style={{ fontSize: 10.5, color: "#9C5E26", fontWeight: 600, marginBottom: 5 }}>그 외 {others.length}명</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {others.map((m, i) => (
              <span key={i} onClick={() => onPickMember && onPickMember(m)}
                style={{ padding: "3px 8px", background: "#fff", border: "1px solid #FFE0BA", borderRadius: 999, fontSize: 11, color: "#7A4A14", fontWeight: 600, cursor: "pointer" }}>{m.name}</span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// R2Calendar 메인
// ─────────────────────────────────────────────
function R2Calendar() {
  const [modal, setModal] = React.useState(null);   // { date, mode, initial }
  const [popover, setPopover] = React.useState(null); // { event, anchor }

  const handleDayClick = (day, events) => {
    setModal({
      date: `2026년 6월 ${day}일 (${["일","월","화","수","목","금","토"][((day + 0) % 7)]})`,
      mode: events ? "list" : "create",
      initial: events ? { events } : null,
    });
  };
  const handleChipClick = (event, anchor) => {
    setPopover({ event, anchor });
  };

  return (
    <main style={{ flex: 1, display: "flex", flexDirection: "column", background: "#F4F7FB", overflow: "hidden" }}>
      <TopBar title="코칭 캘린더" subtitle="정태영 팀장 · 이번 달 1on1 6건"/>
      <div style={{ flex: 1, overflowY: "auto", padding: "24px 32px 40px" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "flex-end", gap: 16, marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#3B5BDB", letterSpacing: "0.04em", textTransform: "uppercase" }}>2026 상반기 · 6월</div>
            <h1 style={{ margin: "6px 0 0", fontSize: 26, fontWeight: 700, color: "#0F1A36", letterSpacing: "-0.025em", lineHeight: 1.2 }}>
              팀원과의 일정을 한눈에
            </h1>
            <p style={{ margin: "4px 0 0", fontSize: 13.5, color: "#5B6685" }}>
              오늘은 강동우 님 1on1이 오전 10시에 잡혀있어요. 미등록 팀원 4명 확인이 필요해요.
            </p>
          </div>
          <div style={{ flex: 1 }}/>
          <Button variant="primary" leftIcon={<span style={{ fontSize: 14 }}>+</span>}
            onClick={() => setModal({ date: "2026년 6월 12일 (금)", mode: "create" })}>일정 등록</Button>
        </div>

        {/* Two columns */}
        <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.65fr) 320px", gap: 18 }}>
          <FullCalendar onDayClick={handleDayClick} onChipClick={handleChipClick}/>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <MonthEventList/>
            <UnregisteredList onPickMember={(m) => setModal({
              date: "2026년 6월 12일 (금)", mode: "create",
              initial: { type: "oneonone", participants: [m.id] },
            })}/>
          </div>
        </div>
      </div>

      <EventModal open={!!modal}
        date={modal?.date}
        mode={modal?.mode}
        initial={modal?.initial}
        onClose={() => setModal(null)}/>

      {popover && <EventPopover event={popover.event} anchor={popover.anchor}
        onClose={() => setPopover(null)}
        onEdit={() => { setModal({ date: "2026년 6월", mode: "create", initial: popover.event }); setPopover(null); }}/>}
    </main>
  );
}

window.R2Calendar = R2Calendar;
</script>
<script type="text/babel">
  function App() { return (<><Sidebar active="coaching"/><R2Calendar/></>); }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
