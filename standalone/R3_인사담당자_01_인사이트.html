<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OKR LENS — 인사담당자</title>
<style>/* ============================================================
   OKR LENS — Design System
   colors_and_type.css
   사내 OKR 평가·코칭 AI 서비스 — 친근한 SaaS 톤 · 넉넉한 여백
   ============================================================ */

/* ---------- 1. Fonts ---------- */
@font-face {
  font-family: 'Pretendard';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Medium.woff2') format('woff2');
}

:root {
  /* ---------- 2. Color — Brand / Primary (Friendly Blue) ---------- */
  /* 참고 이미지의 SSO 버튼/CTA 컬러에서 추출. 인디고가 아닌 더 밝은 'Friendly Blue'. */
  --brand-900: #142250;   /* deepest — text accent on light bg */
  --brand-800: #1B2A4E;   /* dark navy — sidebar, hero text accent (참고 이미지 좌측 다크 카드) */
  --brand-700: #213A8C;
  --brand-600: #2C49B8;
  --brand-500: #3B5BDB;   /* PRIMARY — SSO 버튼 컬러 */
  --brand-400: #5C7AE6;
  --brand-300: #91A6F0;
  --brand-200: #C5D0F7;
  --brand-100: #E5EBFB;
  --brand-50:  #F1F4FD;

  /* ---------- 3. Role Accents (3역할 컬러 코딩) ---------- */
  /* 참고 이미지: 피평가자=블루, 평가자=그린, 인사담당자=오렌지/코랄 */
  --role-r1-bg:   #E8F0FF;
  --role-r1-fg:   #3B5BDB;
  --role-r1-mark: #3B5BDB;

  --role-r2-bg:   #E3F4EA;
  --role-r2-fg:   #2F9E5E;
  --role-r2-mark: #2F9E5E;

  --role-r3-bg:   #FFEDE2;
  --role-r3-fg:   #E07A3C;
  --role-r3-mark: #E07A3C;

  /* ---------- 4. Color — Neutrals (Cool Slate, softer than v1) ---------- */
  --ink-900: #0F1A36;     /* heading */
  --ink-800: #1F2A4A;
  --ink-700: #3A4565;     /* body strong */
  --ink-600: #5B6685;     /* body */
  --ink-500: #7C87A4;     /* secondary */
  --ink-400: #A4ADC4;     /* tertiary, icon */
  --ink-300: #C8CFDF;     /* disabled */
  --ink-200: #E1E5EF;     /* divider */
  --ink-150: #ECEFF5;
  --ink-100: #F4F7FB;     /* PAGE BACKGROUND — 참고 이미지 베이스 */
  --ink-50:  #F9FAFC;
  --ink-0:   #FFFFFF;

  /* ---------- 5. Color — Semantic (Status) ---------- */
  /* 친근한 톤 — 채도 더 낮춤. "코칭" 시선 유지. */
  --risk-high-fg:   #D14343;
  --risk-high-bg:   #FFF0F0;
  --risk-high-bd:   #FFD4D4;

  --risk-mid-fg:    #D98023;
  --risk-mid-bg:    #FFF7EC;
  --risk-mid-bd:    #FFE0BA;

  --risk-low-fg:    #2F9E5E;
  --risk-low-bg:    #ECFAF1;
  --risk-low-bd:    #BBE9CC;

  --info-fg:        #2B5DD9;
  --info-bg:        #EFF4FE;
  --info-bd:        #C5D5F7;

  /* ---------- 6. Status — 승인 enum (D5) ---------- */
  --status-draft-fg:    #5B6685;
  --status-draft-bg:    #F1F3F8;
  --status-pending-fg:  #2B5DD9;
  --status-pending-bg:  #EFF4FE;
  --status-approved-fg: #2F9E5E;
  --status-approved-bg: #ECFAF1;
  --status-rejected-fg: #D14343;
  --status-rejected-bg: #FFF0F0;
  --status-adjust-fg:   #D98023;
  --status-adjust-bg:   #FFF7EC;

  /* ---------- 7. Difficulty / Grade ---------- */
  --diff-high: #7C4DD9;
  --diff-mid:  #3B5BDB;
  --diff-low:  #7C87A4;

  --grade-s: #6B47E0;
  --grade-a: #3B5BDB;
  --grade-b: #2F9E5E;
  --grade-c: #D98023;
  --grade-d: #7C87A4;

  /* ---------- 8. Data viz / Heatmap ---------- */
  --heat-0: #F1F4FD;
  --heat-1: #DCE3F8;
  --heat-2: #B7C4F0;
  --heat-3: #8FA1E5;
  --heat-4: #5C7AE6;
  --heat-5: #3B5BDB;

  /* ---------- 9. Typography — Stacks ---------- */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular,
               'SF Mono', Consolas, 'Liberation Mono', monospace;

  /* ---------- 10. Type — Sizes & line-heights ---------- */
  /* base 15px — 참고 이미지의 넉넉한 밀도에 맞춰 한 단계 키움 */
  --fs-hero:     48px;   /* 랜딩 메인 헤드라인 */
  --fs-display:  36px;
  --fs-h1:       28px;
  --fs-h2:       22px;
  --fs-h3:       18px;
  --fs-body-lg:  16px;
  --fs-body:     15px;   /* body default */
  --fs-sm:       13.5px;
  --fs-xs:       12.5px;
  --fs-micro:    11.5px;

  --lh-tight:    1.25;
  --lh-snug:     1.45;
  --lh-normal:   1.7;
  --lh-relaxed:  1.85;

  --tracking-tight:  -0.025em;
  --tracking-normal: -0.005em;
  --tracking-wide:   0.04em;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* ---------- 11. Spacing scale (4pt grid) ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;
  --sp-11: 80px;
  --sp-12: 96px;

  /* ---------- 12. Radius — 더 부드럽게 ---------- */
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;    /* 기본 카드 */
  --radius-xl: 20px;    /* 큰 카드, 패널 */
  --radius-2xl: 28px;   /* 히어로 일러스트 박스 */
  --radius-pill: 999px;

  /* ---------- 13. Shadow / Elevation — 부드럽고 옅음 ---------- */
  --shadow-xs: 0 1px 2px rgba(31, 42, 74, 0.04);
  --shadow-sm: 0 2px 6px rgba(31, 42, 74, 0.05);
  --shadow-md: 0 6px 16px -4px rgba(31, 42, 74, 0.08);
  --shadow-lg: 0 16px 40px -10px rgba(31, 42, 74, 0.10);
  --shadow-xl: 0 30px 60px -16px rgba(31, 42, 74, 0.16);
  --shadow-focus: 0 0 0 4px rgba(59, 91, 219, 0.16);
  --shadow-card-hover: 0 12px 28px -8px rgba(59, 91, 219, 0.18);

  /* ---------- 14. Borders ---------- */
  --bd-subtle: 1px solid var(--ink-150);
  --bd-default: 1px solid var(--ink-200);
  --bd-strong: 1px solid var(--ink-300);
  --bd-focus: 1.5px solid var(--brand-500);

  /* ---------- 15. Motion ---------- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 320ms;

  /* ---------- 16. Layout ---------- */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --content-max: 1440px;
  --page-pad-x: 40px;
  --page-pad-y: 32px;
}

/* ============================================================
   Semantic typography classes
   ============================================================ */
.ds-hero {
  font-family: var(--font-sans);
  font-size: var(--fs-hero);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-display {
  font-family: var(--font-sans);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-h3);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-600);
}
.ds-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-500);
}
.ds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--ink-700);
  font-feature-settings: "tnum" 1;
}
.ds-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

.ds-reset, .ds-reset * { box-sizing: border-box; }
.ds-reset {
  font-family: var(--font-sans);
  color: var(--ink-600);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   OKR LENS Responsive — 2026 리브랜드
   ============================================================ */
* { box-sizing: border-box; }
html, body { max-width: 100%; overflow-x: auto; }
body { font-size: 16px; }

.okrlens-sidebar,
aside[class*="Sidebar"] {
  transition: width 220ms cubic-bezier(.16,1,.3,1);
}
@media (max-width: 1024px) {
  .okrlens-sidebar { width: 76px !important; min-width: 76px !important; padding-left: 10px !important; padding-right: 10px !important; }
  .okrlens-sidebar > div:first-child > span:not(:first-child),
  .okrlens-sidebar > div:first-child > span:last-child { display: none !important; }
  .okrlens-sidebar > div:first-child { justify-content: center !important; padding: 4px 0 22px !important; }
  .okrlens-sidebar a > div span:last-child,
  .okrlens-sidebar > div > div:last-child > div:last-child { display: none !important; }
  .okrlens-sidebar a > div,
  .okrlens-sidebar > div > div {
    justify-content: center !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}
@media (max-width: 900px) {
  .okrlens-sidebar { width: 72px !important; min-width: 72px !important; padding-left: 8px !important; padding-right: 8px !important; }
}
@media (max-width: 640px) {
  .okrlens-sidebar { position: fixed; z-index: 100; height: 100vh; transform: translateX(-100%); }
  .okrlens-sidebar.open { transform: translateX(0); }
  #app > div > div:last-child,
  main { padding-left: 12px !important; padding-right: 12px !important; }
}

main, [class*="page-content"] {
  padding-left: clamp(16px, 3vw, 40px);
  padding-right: clamp(16px, 3vw, 40px);
}

@media (max-width: 900px) {
  [style*="gridTemplateColumns"][style*="1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
@media (max-width: 640px) {
  [style*="repeat(3, 1fr)"],
  [style*="repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="gap: 56px"], [style*="gap:56px"] { gap: 24px !important; }
  [style*="gap: 40px"], [style*="gap:40px"] { gap: 20px !important; }
}

.okrlens-topbar {
  flex-wrap: wrap;
  gap: 12px !important;
  padding: 12px 20px !important;
}
@media (max-width: 900px) {
  .okrlens-search { width: 100% !important; order: 10; }
  .okrlens-period { display: none !important; }
}

body, .ds-body { font-size: 16px; }
h1, .ds-h1 { font-size: clamp(22px, 3vw, 28px); }
h2, .ds-h2 { font-size: clamp(19px, 2.4vw, 22px); }


</style>

function Icon({ name, size = 18, strokeWidth = 1.75, style = {}, ...rest }) {
  const path = ICONS[name];
  if (!path) return null;
  return (
    <svg
      viewBox="0 0 24 24"
      width={size}
      height={size}
      fill="none"
      stroke="currentColor"
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}
      {...rest}
    >
      {path}
    </svg>
  );
}

<script type="text/babel">function Button({ variant = "primary", size = "md", children, leftIcon, rightIcon, onClick, disabled }) {
  const base = {
    fontFamily: "var(--font-sans)",
    fontWeight: 600,
    borderRadius: 10,
    border: "1px solid transparent",
    cursor: disabled ? "not-allowed" : "pointer",

    letterSpacing: "-0.005em",
    transition: "background 140ms ease-out, border-color 140ms ease-out, box-shadow 140ms ease-out",
    opacity: disabled ? 0.42 : 1,
  };
  const sizes = {
    sm: { fontSize: 12.5, padding: "7px 12px" },
    md: { fontSize: 13.5, padding: "10px 16px" },
    lg: { fontSize: 15, padding: "12px 22px" },
  };
  const variants = {
    primary:   { background: "#3B5BDB", color: "#fff", boxShadow: "0 1px 2px rgba(31,42,74,.08)" },
    secondary: { background: "#fff", color: "#1F2A4A", borderColor: "#C8CFDF" },
    ghost:     { background: "transparent", color: "#3A4565" },
    danger:    { background: "#fff", color: "#D14343", borderColor: "#FFD4D4" },
    success:   { background: "#2F9E5E", color: "#fff" },
    ai:        { background: "#F1F4FD", color: "#213A8C", borderColor: "#C5D0F7" },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyles = {
    primary:   { background: "#2C49B8" },
    secondary: { background: "#F4F7FB" },
    ghost:     { background: "#F4F7FB" },
    danger:    { background: "#FFF0F0" },
    success:   { background: "#268F52" },
    ai:        { background: "#E5EBFB" },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}) }}
    >
      {leftIcon}
      {children}
      {rightIcon}
    </button>
  );
}

<script type="text/babel">// R3Console.jsx — 인사담당자 캘리브레이션 인사이트 (v4 · 데이터-rich)
// 이전 두루뭉술한 "5 카드 메뉴" → 실제 분석 위젯으로 교체:
// 01 본부×직급 히트맵 · 02 위험유형 TOP 분포 · 03 본부별 코칭 워크리스트
// 04 사후조정 비중 · 05 분기 추세 · 06 사례카드 (AI 추출)

// ============ Tokens ============
const C = {
  ink: "#0F1A36", ink2: "#3A4565", ink3: "#5B6685", ink4: "#7C87A4", ink5: "#A4ADC4",
  brand: "#3B5BDB", brandLight: "#E5EBFB",
  green: "#2F9E5E", greenLight: "#ECFAF1",
  amber: "#D98023", amberLight: "#FFF7EC",
  red: "#D14343", redLight: "#FDECEC",
  purple: "#7C4DD9", purpleLight: "#F0E9FB",
  orange: "#E07A3C", orangeLight: "#FFEDE2",
  border: "#E1E5EF", borderLight: "#ECEFF5",
  bg: "#F4F7FB", bg2: "#F9FAFC",
};

// ============ Atoms ============
function CardShell({ children, padding = "24px 26px", hoverable = false, accent }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={() => hoverable && setHover(true)}
      onMouseLeave={() => hoverable && setHover(false)}
      style={{
        background: "#fff", border: `1px solid ${hover && accent ? accent : C.border}`,
        borderRadius: 16, padding, boxShadow: hover ? "0 12px 28px -10px rgba(31,42,74,.12)" : "0 1px 2px rgba(31,42,74,.04)",
        transition: "all 220ms cubic-bezier(0.16, 1, 0.3, 1)",
        cursor: hoverable ? "pointer" : "default",
      }}
    >{children}</div>
  );
}

function SectionHeader({ num, title, hint, action }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 14, marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>

        <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: C.ink, letterSpacing: "-0.015em" }}>{title}</h2>
        {hint && <span style={{ fontSize: 12, color: C.ink4 }}>· {hint}</span>}
      </div>
      <div style={{ flex: 1, height: 1, background: C.borderLight }}/>
      {action}
    </div>
  );
}

function MonoNum({ children, size = 16, color = C.ink, weight = 700 }) {
  return <span style={{ fontFamily: "var(--font-mono)", fontSize: size, fontWeight: weight, color, fontVariantNumeric: "tabular-nums", letterSpacing: "-0.015em" }}>{children}</span>;
}

function Pill({ label, color, bg, size = 11 }) {
  return <span style={{ padding: "3px 9px", borderRadius: 999, background: bg, color, fontSize: size, fontWeight: 700, letterSpacing: "0.02em" }}>{label}</span>;
}

// ============ Hero Stats — 데이터-rich KPI ============
function HeroKpi() {
  // 4 KPI but each has a sparkline + delta + benchmark
  const kpis = [
    {
      label: "검토 완료율", value: 64, unit: "%", delta: "+12", deltaTone: "ok",
      sub: "552명 중 354명", spark: [42, 48, 51, 55, 58, 64], color: C.brand,
      bench: "목표 80%", benchProgress: 80, current: 64,
    },
    {
      label: "코칭 후보 (위험도 ≥ 중)", value: 40, unit: "건", delta: "-8", deltaTone: "ok",
      sub: "전체 286건 중 14%", spark: [62, 58, 53, 48, 44, 40], color: C.amber,
      bench: "임계 50건", benchProgress: 100, current: 80,
    },
    {
      label: "사후조정 가능 비중", value: 28.4, unit: "%", delta: "+3.1", deltaTone: "warn",
      sub: "공모형 · 건수형 · 자기보고형", spark: [22, 23, 25, 26, 27, 28.4], color: C.red,
      bench: "임계 30%", benchProgress: 100, current: 95,
    },
    {
      label: "기준 통일도", value: 87, unit: "%", delta: "+5", deltaTone: "ok",
      sub: "평가자 11항목 일치율", spark: [76, 79, 81, 83, 85, 87], color: C.green,
      bench: "목표 90%", benchProgress: 90, current: 87,
    },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 28 }}>
      {kpis.map((k, i) => {
        const max = Math.max(...k.spark), min = Math.min(...k.spark);
        const norm = (v) => 1 - (v - min) / (max - min || 1);
        const W = 100, H = 28;
        const points = k.spark.map((v, idx) => `${(idx / (k.spark.length - 1)) * W},${norm(v) * H}`).join(" ");
        return (
          <div key={i} style={{
            background: "#fff", border: `1px solid ${C.border}`, borderRadius: 14,
            padding: "18px 20px", boxShadow: "0 1px 2px rgba(31,42,74,.04)",
            display: "flex", flexDirection: "column", gap: 12,
          }}>
            <div style={{ display: "flex", alignItems: "flex-start" }}>
              <div style={{ fontSize: 12.5, fontWeight: 500, color: C.ink3, lineHeight: 1.4, flex: 1 }}>{k.label}</div>
              <span style={{
                padding: "2px 7px", borderRadius: 6,
                background: k.deltaTone === "ok" ? C.greenLight : C.amberLight,
                color: k.deltaTone === "ok" ? C.green : C.amber,
                fontSize: 11, fontWeight: 700, fontFamily: "var(--font-mono)",
              }}>{k.delta}{k.unit === "%" ? "%p" : ""}</span>
            </div>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
              <div>
                <MonoNum size={30} color={C.ink}>{k.value}</MonoNum>
                <span style={{ fontSize: 14, color: C.ink4, marginLeft: 4, fontWeight: 500 }}>{k.unit}</span>
              </div>
              <svg width={W} height={H} style={{ overflow: "visible" }}>
                <polyline points={points} fill="none" stroke={k.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx={W} cy={norm(k.spark[k.spark.length - 1]) * H} r="2.5" fill={k.color}/>
              </svg>
            </div>
            <div style={{ fontSize: 11, color: C.ink4 }}>{k.sub}</div>
            {/* Progress vs benchmark */}
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 10.5, color: C.ink4 }}>{k.bench}</span>
                <MonoNum size={10.5} color={C.ink4} weight={600}>{Math.round((k.current / k.benchProgress) * 100)}%</MonoNum>
              </div>
              <div style={{ height: 4, background: C.bg2, borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(k.current / k.benchProgress) * 100}%`, background: k.color, borderRadius: 2 }}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============ 01 본부×직급 난이도 히트맵 (drill-down) ============
function HqGradeHeatmap() {
  const rows = [
    { name: "운영본부", cells: [42, 28, 18, 12], total: 78 },
    { name: "개발본부", cells: [36, 34, 22, 8], total: 92 },

  ];
  const cols = ["3급", "4급갑", "4급을", "5급"];
  const heat = (v) => {
    if (v >= 40) return { bg: "#1F3FB8", fg: "#fff" };
    if (v >= 30) return { bg: C.brand, fg: "#fff" };
    if (v >= 22) return { bg: "#8FA1E5", fg: "#0F1A36" };
    if (v >= 15) return { bg: "#B7C4F0", fg: "#0F1A36" };
    return { bg: "#DCE3F8", fg: "#0F1A36" };
  };
  return (
    <CardShell padding="22px 24px">
      <div style={{ display: "flex", alignItems: "center", marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 13.5, fontWeight: 700, color: C.ink }}>본부 × 직급 · 난이도 "상" 비중</div>
          <div style={{ fontSize: 11.5, color: C.ink4, marginTop: 3 }}>난이도 통일도가 낮은 셀에 코칭 후보가 몰려 있어요.</div>
        </div>
        <div style={{ flex: 1 }}/>
        <Pill label="평균 25.8% · 표준편차 9.2" color={C.ink2} bg={C.bg2}/>
      </div>

      {/* Heatmap */}
      <div style={{ display: "grid", gridTemplateColumns: "92px repeat(4, 1fr) 60px", gap: 5 }}>
        <div></div>
        {cols.map((g) => <div key={g} style={{ fontSize: 10.5, fontWeight: 700, color: C.ink4, letterSpacing: "0.04em", textTransform: "uppercase", textAlign: "center", padding: "4px 0" }}>{g}</div>)}
        <div style={{ fontSize: 10.5, fontWeight: 700, color: C.ink4, letterSpacing: "0.04em", textTransform: "uppercase", textAlign: "center", padding: "4px 0" }}>합계</div>
        {rows.map((r) => (
          <React.Fragment key={r.name}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.ink, textAlign: "right", paddingRight: 10, display: "flex", alignItems: "center", justifyContent: "flex-end" }}>{r.name}</div>

              const c = heat(v);
              const outlier = v >= 40 || v <= 12;

                </div>
              );
            })}
            <div style={{ textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <MonoNum size={12} color={C.ink3}>{r.total}건</MonoNum>
            </div>

      {/* Coaching note */}
      <div style={{
        marginTop: 16, padding: "12px 14px",

      </div>

        {/* Y grid */}
        {[0, 25, 50, 75, 100].map((y) => (
          <line key={y} x1={P} x2={W - 10} y1={H - P - (y / 100) * (H - P * 1.5)} y2={H - P - (y / 100) * (H - P * 1.5)} stroke="#ECEFF5" strokeWidth="1"/>
        ))}
        {/* X labels */}
        {labels.map((l, i) => (
          <text key={l} x={P + (i / (labels.length - 1)) * (W - P - 10)} y={H - 8} fontSize="10" fill="#7C87A4" textAnchor="middle" fontFamily="var(--font-mono)">{l}</text>
        ))}
        {/* Lines */}
        {series.map((s) => {
          const max = Math.max(...s.values, s.target);
          const pts = s.values.map((v, i) => `${P + (i / (s.values.length - 1)) * (W - P - 10)},${H - P - (v / max) * (H - P * 1.5)}`).join(" ");
          return (
            <g key={s.label}>
              <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {s.values.map((v, i) => (
                <circle key={i} cx={P + (i / (s.values.length - 1)) * (W - P - 10)} cy={H - P - (v / max) * (H - P * 1.5)} r="3" fill="#fff" stroke={s.color} strokeWidth="2"/>
              ))}
            </g>
          );
        })}
      </svg>

      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 6 }}>
        {series.map((s) => {
          const last = s.values[s.values.length - 1];
          const first = s.values[0];
          const delta = (last - first).toFixed(1);
          const isImproving = (s.label === "코칭 후보율") ? delta < 0 : delta > 0;
          return (
            <div key={s.label} style={{ display: "grid", gridTemplateColumns: "12px 1fr 60px 56px", alignItems: "center", gap: 8, fontSize: 11.5 }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: s.color }}/>
              <span style={{ color: C.ink2 }}>{s.label}</span>
              <MonoNum size={12} color={C.ink}>{last}{s.unit || "%"}</MonoNum>
              <MonoNum size={11} color={isImproving ? C.green : C.red} weight={600}>{delta > 0 ? "+" : ""}{delta}</MonoNum>
            </div>
          );
        })}
      </div>
    </CardShell>
  );
}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(11, 1fr)", gap: 6, alignItems: "end", height: 110 }}>
        {items.map((it) => {
          const h = (it.rate / 20) * 100;
          const tone = it.rate >= 14 ? C.red : it.rate >= 8 ? C.amber : C.green;
          return (
            <div key={it.no} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <MonoNum size={10.5} color={tone} weight={700}>{it.rate}%</MonoNum>
              <div style={{ height: 88, width: "100%", display: "flex", alignItems: "flex-end" }}>
                <div style={{ width: "100%", height: `${Math.max(h, 4)}%`, background: tone, borderRadius: "5px 5px 0 0", opacity: 0.85 }}/>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(11, 1fr)", gap: 6, marginTop: 8 }}>
        {items.map((it) => (
          <div key={it.no} style={{ textAlign: "center", fontSize: 9.5, color: C.ink4, lineHeight: 1.3 }}>
            <div style={{ fontFamily: "var(--font-mono)", fontWeight: 700, color: C.ink3 }}>{String(it.no).padStart(2, "0")}</div>
            <div style={{ marginTop: 2 }}>{it.name}</div>
          </div>
        ))}
      </div>
    </CardShell>
  );
}
