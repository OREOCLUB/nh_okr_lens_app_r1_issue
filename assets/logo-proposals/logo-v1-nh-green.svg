<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" fill="none">
  <!-- NH Green mark with lens motif -->
  <rect width="44" height="44" rx="11" fill="#009A44"/>
  <!-- NH accent bar (yellow) at top-left corner -->
  <path d="M0 11 A11 11 0 0 1 11 0 L14 0 L14 4 L4 4 L4 14 L0 14 Z" fill="#F8B62D"/>
  <!-- Lens: outer + inner ring + core -->
  <circle cx="22" cy="22" r="11.5" stroke="#fff" stroke-width="2.4" opacity="0.5"/>
  <circle cx="22" cy="22" r="6.5" stroke="#fff" stroke-width="2.4"/>
  <circle cx="22" cy="22" r="2.2" fill="#fff"/>
  <!-- Growth arrow -->
  <path d="M29.5 14.5 L33.5 14.5 L33.5 18.5" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M33.5 14.5 L26.5 21.5" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="56" y="22" font-family="Pretendard, -apple-system, sans-serif"
        font-size="10" font-weight="600" fill="#00733F" letter-spacing="0.14em">
    NH · 농협
  </text>
  <text x="56" y="37" font-family="Pretendard, -apple-system, sans-serif"
        font-size="19" font-weight="800" fill="#0F1A36" letter-spacing="-0.02em">
    OKR<tspan fill="#009A44"> LENS</tspan>
  </text>
</svg>
