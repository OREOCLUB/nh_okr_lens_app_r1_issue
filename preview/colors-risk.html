<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .card{border:1px solid var(--ink-200);border-radius:12px;padding:14px;}
  .label{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px;}
  .swatch-row{display:flex;gap:5px;margin-bottom:10px;}
  .sw{flex:1;height:30px;border-radius:6px;font-family:var(--font-mono);font-size:9.5px;display:flex;align-items:center;justify-content:center;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .note{font-size:11.5px;color:var(--ink-500);margin-top:12px;line-height:1.55;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="name">Risk Semantic</div><div class="meta">친근한 톤 — 채도 한 단계 더 낮춤 · 코칭 시선</div></div>
  <div class="grid">
    <div class="card">
      <div class="label">Risk · 상</div>
      <div class="swatch-row">
        <div class="sw" style="background:#FFF0F0;color:#D14343">bg</div>
        <div class="sw" style="background:#FFD4D4;color:#D14343">bd</div>
        <div class="sw" style="background:#D14343;color:#fff">fg</div>
      </div>
      <span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343">코칭 · 상</span>
    </div>
    <div class="card">
      <div class="label">Risk · 중</div>
      <div class="swatch-row">
        <div class="sw" style="background:#FFF7EC;color:#D98023">bg</div>
        <div class="sw" style="background:#FFE0BA;color:#D98023">bd</div>
        <div class="sw" style="background:#D98023;color:#fff">fg</div>
      </div>
      <span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023">코칭 · 중</span>
    </div>
    <div class="card">
      <div class="label">Risk · 하 / 양호</div>
      <div class="swatch-row">
        <div class="sw" style="background:#ECFAF1;color:#2F9E5E">bg</div>
        <div class="sw" style="background:#BBE9CC;color:#2F9E5E">bd</div>
        <div class="sw" style="background:#2F9E5E;color:#fff">fg</div>
      </div>
      <span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E">양호 · 하</span>
    </div>
    <div class="card">
      <div class="label">Info</div>
      <div class="swatch-row">
        <div class="sw" style="background:#EFF4FE;color:#2B5DD9">bg</div>
        <div class="sw" style="background:#C5D5F7;color:#2B5DD9">bd</div>
        <div class="sw" style="background:#2B5DD9;color:#fff">fg</div>
      </div>
      <span class="pill" style="background:#EFF4FE;border-color:#C5D5F7;color:#2B5DD9">참고 · 안내</span>
    </div>
  </div>
  <div class="note">"위반"이 아니라 "코칭 후보" · 빨강은 #D14343 — 친근하고 위협적이지 않은 톤.</div>
</div></body></html>
