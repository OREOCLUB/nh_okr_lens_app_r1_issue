<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#F4F7FB;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:18px 22px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .kr{background:#fff;border:1px solid #E1E5EF;border-radius:14px;padding:18px 20px;box-shadow:0 1px 2px rgba(31,42,74,.04);}
  .row1{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .kr-id{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-500);}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid;}
  .pill .dot{width:5px;height:5px;border-radius:50%;}
  .obj{font-size:12.5px;color:var(--ink-500);margin-bottom:4px;}
  .kr-text{font-size:17px;font-weight:600;color:var(--ink-900);line-height:1.45;margin-bottom:14px;letter-spacing:-0.015em;}
  .meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;border-top:1px solid #ECEFF5;padding-top:14px;}
  .m-lab{font-size:10.5px;font-weight:700;color:var(--ink-500);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
  .m-val{font-size:13px;color:var(--ink-900);font-weight:500;}
  .m-val .num{font-family:var(--font-mono);}
  .chev{margin-left:auto;color:var(--ink-400);font-size:14px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">KR Block</div><div class="meta">Objective → KR → 측정 → 가중치</div></div>
  <div class="kr">
    <div class="row1">
      <span class="kr-id">KR_2026_001</span>
      <span class="pill" style="background:#EFF4FE;border-color:#C5D5F7;color:#2B5DD9"><span class="dot" style="background:#2B5DD9"></span>제출</span>
      <span class="pill" style="background:#E0F7EC;border-color:#B9F1D8;color:#007048">난이도 · 중</span>
      <span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023">코칭 · 중</span>
      <span class="chev">▾</span>
    </div>
    <div class="obj">Objective · 핵심 서비스 응답속도 개선</div>
    <div class="kr-text">결제 게이트웨이 APM p95 응답속도를 850ms → 500ms로 단축한다.</div>
    <div class="meta-grid">
      <div><div class="m-lab">KR 유형</div><div class="m-val">수치</div></div>
      <div><div class="m-lab">측정 방법</div><div class="m-val">APM p95 월평균</div></div>
      <div><div class="m-lab">Baseline → Goal</div><div class="m-val"><span class="num">850ms → 500ms</span></div></div>
      <div><div class="m-lab">가중치</div><div class="m-val"><span class="num">30%</span></div></div>
    </div>
  </div>
</div></body></html>
