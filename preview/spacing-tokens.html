<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:#00A968;border-radius:4px;width:100%;}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);}
  .lab b{color:var(--ink-900);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Spacing · 4pt grid</div><div class="meta">--sp-1 ~ --sp-12 · 4 · 8 · 12 · 16 · 20 · 24 · 32 · 40 · 48 · 64 · 80 · 96</div></div>
  <div class="grid">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lab"><b>1</b> 4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lab"><b>2</b> 8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lab"><b>3</b> 12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lab"><b>4</b> 16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="lab"><b>5</b> 20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lab"><b>6</b> 24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lab"><b>7</b> 32</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="lab"><b>8</b> 40</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="lab"><b>9</b> 48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="lab"><b>10</b> 64</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="lab"><b>11</b> 80</div></div>
    <div class="col"><div class="bar" style="height:96px"></div><div class="lab"><b>12</b> 96</div></div>
  </div>
</div></body></html>
