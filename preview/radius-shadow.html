<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-500);margin:10px 0 10px;}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .box{width:66px;height:50px;background:#fff;border:1px solid #E1E5EF;}
  .lab{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-500);}
  .lab b{color:var(--ink-900);}
  .sh-box{background:#fff;border:1px solid #E1E5EF;width:90px;height:54px;border-radius:14px;}
  .sh-wrap{padding:14px 8px 8px;background:#F4F7FB;border-radius:8px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Radius · Shadow</div><div class="meta">큰 radius · 부드럽고 옅은 그림자</div></div>

  <div class="section-label">Radius</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lab"><b>xs</b> 6</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lab"><b>sm</b> 8</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="lab"><b>md</b> 10</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="lab"><b>lg</b> 14</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="lab"><b>xl</b> 20</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="lab"><b>2xl</b> 28</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:90px"></div><div class="lab"><b>pill</b> 999</div></div>
  </div>

  <div class="section-label" style="margin-top:18px">Shadow / Elevation</div>
  <div class="row">
    <div class="item"><div class="sh-wrap"><div class="sh-box" style="box-shadow:0 1px 2px rgba(31,42,74,.04)"></div></div><div class="lab"><b>xs</b> card</div></div>
    <div class="item"><div class="sh-wrap"><div class="sh-box" style="box-shadow:0 2px 6px rgba(31,42,74,.05)"></div></div><div class="lab"><b>sm</b> hover</div></div>
    <div class="item"><div class="sh-wrap"><div class="sh-box" style="box-shadow:0 6px 16px -4px rgba(31,42,74,.08)"></div></div><div class="lab"><b>md</b> dropdown</div></div>
    <div class="item"><div class="sh-wrap"><div class="sh-box" style="box-shadow:0 16px 40px -10px rgba(31,42,74,.10)"></div></div><div class="lab"><b>lg</b> modal</div></div>
    <div class="item"><div class="sh-wrap"><div class="sh-box" style="box-shadow:0 30px 60px -16px rgba(31,42,74,.16)"></div></div><div class="lab"><b>xl</b> hero</div></div>
  </div>
</div></body></html>
