<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:12.5px;font-weight:600;color:var(--ink-700);}
  .input{background:#fff;border:1px solid #E1E5EF;border-radius:10px;padding:10px 14px;font-size:14px;color:var(--ink-900);font-family:var(--font-sans);outline:none;}
  .input::placeholder{color:#A4ADC4;}
  .input.focus{border-color:#00A968;box-shadow:0 0 0 4px rgba(0,169,104,.16);}
  .input.error{border-color:#D14343;box-shadow:0 0 0 4px rgba(209,67,67,.12);}
  .hint{font-size:11.5px;color:var(--ink-500);}
  .err{font-size:11.5px;color:#D14343;}
  .select{display:flex;align-items:center;justify-content:space-between;}
  .chev{color:var(--ink-400);font-size:11px;}
  .seg{display:inline-flex;background:#F4F7FB;border-radius:10px;padding:4px;gap:3px;font-size:13px;font-weight:500;}
  .seg button{border:none;background:transparent;padding:7px 12px;border-radius:7px;cursor:pointer;color:var(--ink-700);font-family:var(--font-sans);font-weight:500;font-size:13px;}
  .seg button.on{background:#fff;color:var(--ink-900);font-weight:600;box-shadow:0 1px 3px rgba(31,42,74,.08);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Form Inputs</div><div class="meta">Text · Select · Segmented · 상태별</div></div>
  <div class="grid">
    <div class="field"><label>KR 작성</label><input class="input" placeholder="측정 가능한 목표를 입력하세요"><div class="hint">예: APM p95 응답속도</div></div>
    <div class="field"><label>측정 방법</label><input class="input focus" value="APM p95 월평균"><div class="hint">포커스 상태</div></div>
    <div class="field"><label>가중치 (%)</label><input class="input error" value="120"><div class="err">합산 110 상한을 넘었어요</div></div>

    <div class="field"><label>KR 유형</label><div class="input select"><span>수치형</span><span class="chev">▾</span></div></div>
    <div class="field"><label>OKR 유형</label>
      <div class="seg"><button class="on">운영</button><button>전략혁신</button></div>
    </div>
    <div class="field"><label>난이도</label>
      <div class="seg"><button>상</button><button class="on">중</button><button>하</button></div>
    </div>
  </div>
</div></body></html>
