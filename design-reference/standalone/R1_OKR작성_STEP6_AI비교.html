<style>/* ============================================================
   OKR LENS — Design System
   colors_and_type.css
   사내 OKR 평가·코칭 AI 서비스 — 친근한 SaaS 톤 · 넉넉한 여백
   ============================================================ */

/* ---------- 1. Fonts ---------- */
@font-face {
  font-family: 'Pretendard';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Medium.woff2') format('woff2');
}

:root {
  /* ---------- 2. Color — Brand / Primary (Friendly Blue) ---------- */
  /* 참고 이미지의 SSO 버튼/CTA 컬러에서 추출. 인디고가 아닌 더 밝은 'Friendly Blue'. */
  --brand-900: #142250;   /* deepest — text accent on light bg */
  --brand-800: #1B2A4E;   /* dark navy — sidebar, hero text accent (참고 이미지 좌측 다크 카드) */
  --brand-700: #213A8C;
  --brand-600: #2C49B8;
  --brand-500: #3B5BDB;   /* PRIMARY — SSO 버튼 컬러 */
  --brand-400: #5C7AE6;
  --brand-300: #91A6F0;
  --brand-200: #C5D0F7;
  --brand-100: #E5EBFB;
  --brand-50:  #F1F4FD;

  /* ---------- 3. Role Accents (3역할 컬러 코딩) ---------- */
  /* 참고 이미지: 피평가자=블루, 평가자=그린, 인사담당자=오렌지/코랄 */
  --role-r1-bg:   #E8F0FF;
  --role-r1-fg:   #3B5BDB;
  --role-r1-mark: #3B5BDB;

  --role-r2-bg:   #E3F4EA;
  --role-r2-fg:   #2F9E5E;
  --role-r2-mark: #2F9E5E;

  --role-r3-bg:   #FFEDE2;
  --role-r3-fg:   #E07A3C;
  --role-r3-mark: #E07A3C;

  /* ---------- 4. Color — Neutrals (Cool Slate, softer than v1) ---------- */
  --ink-900: #0F1A36;     /* heading */
  --ink-800: #1F2A4A;
  --ink-700: #3A4565;     /* body strong */
  --ink-600: #5B6685;     /* body */
  --ink-500: #7C87A4;     /* secondary */
  --ink-400: #A4ADC4;     /* tertiary, icon */
  --ink-300: #C8CFDF;     /* disabled */
  --ink-200: #E1E5EF;     /* divider */
  --ink-150: #ECEFF5;
  --ink-100: #F4F7FB;     /* PAGE BACKGROUND — 참고 이미지 베이스 */
  --ink-50:  #F9FAFC;
  --ink-0:   #FFFFFF;

  /* ---------- 5. Color — Semantic (Status) ---------- */
  /* 친근한 톤 — 채도 더 낮춤. "코칭" 시선 유지. */
  --risk-high-fg:   #D14343;
  --risk-high-bg:   #FFF0F0;
  --risk-high-bd:   #FFD4D4;

  --risk-mid-fg:    #D98023;
  --risk-mid-bg:    #FFF7EC;
  --risk-mid-bd:    #FFE0BA;

  --risk-low-fg:    #2F9E5E;
  --risk-low-bg:    #ECFAF1;
  --risk-low-bd:    #BBE9CC;

  --info-fg:        #2B5DD9;
  --info-bg:        #EFF4FE;
  --info-bd:        #C5D5F7;

  /* ---------- 6. Status — 승인 enum (D5) ---------- */
  --status-draft-fg:    #5B6685;
  --status-draft-bg:    #F1F3F8;
  --status-pending-fg:  #2B5DD9;
  --status-pending-bg:  #EFF4FE;
  --status-approved-fg: #2F9E5E;
  --status-approved-bg: #ECFAF1;
  --status-rejected-fg: #D14343;
  --status-rejected-bg: #FFF0F0;
  --status-adjust-fg:   #D98023;
  --status-adjust-bg:   #FFF7EC;

  /* ---------- 7. Difficulty / Grade ---------- */
  --diff-high: #7C4DD9;
  --diff-mid:  #3B5BDB;
  --diff-low:  #7C87A4;

  --grade-s: #6B47E0;
  --grade-a: #3B5BDB;
  --grade-b: #2F9E5E;
  --grade-c: #D98023;
  --grade-d: #7C87A4;

  /* ---------- 8. Data viz / Heatmap ---------- */
  --heat-0: #F1F4FD;
  --heat-1: #DCE3F8;
  --heat-2: #B7C4F0;
  --heat-3: #8FA1E5;
  --heat-4: #5C7AE6;
  --heat-5: #3B5BDB;

  /* ---------- 9. Typography — Stacks ---------- */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular,
               'SF Mono', Consolas, 'Liberation Mono', monospace;

  /* ---------- 10. Type — Sizes & line-heights ---------- */
  /* base 15px — 참고 이미지의 넉넉한 밀도에 맞춰 한 단계 키움 */
  --fs-hero:     48px;   /* 랜딩 메인 헤드라인 */
  --fs-display:  36px;
  --fs-h1:       28px;
  --fs-h2:       22px;
  --fs-h3:       18px;
  --fs-body-lg:  16px;
  --fs-body:     15px;   /* body default */
  --fs-sm:       13.5px;
  --fs-xs:       12.5px;
  --fs-micro:    11.5px;

  --lh-tight:    1.25;
  --lh-snug:     1.45;
  --lh-normal:   1.7;
  --lh-relaxed:  1.85;

  --tracking-tight:  -0.025em;
  --tracking-normal: -0.005em;
  --tracking-wide:   0.04em;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* ---------- 11. Spacing scale (4pt grid) ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;
  --sp-11: 80px;
  --sp-12: 96px;

  /* ---------- 12. Radius — 더 부드럽게 ---------- */
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;    /* 기본 카드 */
  --radius-xl: 20px;    /* 큰 카드, 패널 */
  --radius-2xl: 28px;   /* 히어로 일러스트 박스 */
  --radius-pill: 999px;

  /* ---------- 13. Shadow / Elevation — 부드럽고 옅음 ---------- */
  --shadow-xs: 0 1px 2px rgba(31, 42, 74, 0.04);
  --shadow-sm: 0 2px 6px rgba(31, 42, 74, 0.05);
  --shadow-md: 0 6px 16px -4px rgba(31, 42, 74, 0.08);
  --shadow-lg: 0 16px 40px -10px rgba(31, 42, 74, 0.10);
  --shadow-xl: 0 30px 60px -16px rgba(31, 42, 74, 0.16);
  --shadow-focus: 0 0 0 4px rgba(59, 91, 219, 0.16);
  --shadow-card-hover: 0 12px 28px -8px rgba(59, 91, 219, 0.18);

  /* ---------- 14. Borders ---------- */
  --bd-subtle: 1px solid var(--ink-150);
  --bd-default: 1px solid var(--ink-200);
  --bd-strong: 1px solid var(--ink-300);
  --bd-focus: 1.5px solid var(--brand-500);

  /* ---------- 15. Motion ---------- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 320ms;

  /* ---------- 16. Layout ---------- */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --content-max: 1440px;
  --page-pad-x: 40px;
  --page-pad-y: 32px;
}

/* ============================================================
   Semantic typography classes
   ============================================================ */
.ds-hero {
  font-family: var(--font-sans);
  font-size: var(--fs-hero);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-display {
  font-family: var(--font-sans);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-h3);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-600);
}
.ds-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-500);
}
.ds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--ink-700);
  font-feature-settings: "tnum" 1;
}
.ds-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

.ds-reset, .ds-reset * { box-sizing: border-box; }
.ds-reset {
  font-family: var(--font-sans);
  color: var(--ink-600);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   OKR LENS Responsive — 2026 리브랜드
   ============================================================ */
* { box-sizing: border-box; }
html, body { max-width: 100%; overflow-x: auto; }
body { font-size: 16px; }

/* 사이드바 반응형: 태블릿 이하 아이콘만, 모바일 오프캔버스 */
.okrlens-sidebar,
aside[class*="Sidebar"] {
  transition: width 220ms cubic-bezier(.16,1,.3,1);
}
@media (max-width: 1024px) {
  .okrlens-sidebar { width: 76px !important; min-width: 76px !important; padding-left: 10px !important; padding-right: 10px !important; }
  .okrlens-sidebar > div:first-child > span:not(:first-child),
  .okrlens-sidebar > div:first-child > span:last-child { display: none !important; }
  .okrlens-sidebar > div:first-child { justify-content: center !important; padding: 4px 0 22px !important; }
  .okrlens-sidebar a > div span:last-child,
  .okrlens-sidebar > div > div:last-child > div:last-child { display: none !important; }
  .okrlens-sidebar a > div,
  .okrlens-sidebar > div > div {
    justify-content: center !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}
@media (max-width: 900px) {
  .okrlens-sidebar { width: 72px !important; min-width: 72px !important; padding-left: 8px !important; padding-right: 8px !important; }
}
@media (max-width: 640px) {
  .okrlens-sidebar { position: fixed; z-index: 100; height: 100vh; transform: translateX(-100%); }
  .okrlens-sidebar.open { transform: translateX(0); }
  #app > div > div:last-child,
  main { padding-left: 12px !important; padding-right: 12px !important; }
}

/* 페이지 컨텐츠 반응형 여백 */
main, [class*="page-content"] {
  padding-left: clamp(16px, 3vw, 40px);
  padding-right: clamp(16px, 3vw, 40px);
}

/* 카드/그리드 반응형 - 컬럼 자동 스택 */
@media (max-width: 900px) {
  [style*="gridTemplateColumns"][style*="1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
@media (max-width: 640px) {
  [style*="repeat(3, 1fr)"],
  [style*="repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="gap: 56px"], [style*="gap:56px"] { gap: 24px !important; }
  [style*="gap: 40px"], [style*="gap:40px"] { gap: 20px !important; }
  [style*="padding: \"56px"], [style*="padding: \"48px"] { padding: 24px !important; }
}

/* 상단바 반응형: 780px 이하부터 줄바꿈 */
.okrlens-topbar { padding: 0 32px !important; }
@media (max-width: 780px) {
  .okrlens-topbar {
    flex-wrap: wrap;
    gap: 10px !important;
    padding: 12px 20px !important;
  }
  .okrlens-search { width: 100% !important; order: 10; }
  .okrlens-period { display: none !important; }
}

/* 폰트 크기 가독성 상향 */
body, .ds-body { font-size: 16px; }
h1, .ds-h1 { font-size: clamp(22px, 3vw, 28px); }
h2, .ds-h2 { font-size: clamp(19px, 2.4vw, 22px); }

<script type="text/babel">function Button({ variant = "primary", size = "md", children, leftIcon, rightIcon, onClick, disabled }) {
  const base = {
    fontFamily: "var(--font-sans)",
    fontWeight: 600,
    borderRadius: 10,
    border: "1px solid transparent",
    cursor: disabled ? "not-allowed" : "pointer",
    display: "inline-flex",
    alignItems: "center",
    gap: 7,
    lineHeight: 1,
    letterSpacing: "-0.005em",
    transition: "background 140ms ease-out, border-color 140ms ease-out, box-shadow 140ms ease-out",
    opacity: disabled ? 0.42 : 1,
  };
  const sizes = {
    sm: { fontSize: 12.5, padding: "7px 12px" },
    md: { fontSize: 13.5, padding: "10px 16px" },
    lg: { fontSize: 15, padding: "12px 22px" },
  };
  const variants = {
    primary:   { background: "#3B5BDB", color: "#fff", boxShadow: "0 1px 2px rgba(31,42,74,.08)" },
    secondary: { background: "#fff", color: "#1F2A4A", borderColor: "#C8CFDF" },
    ghost:     { background: "transparent", color: "#3A4565" },
    danger:    { background: "#fff", color: "#D14343", borderColor: "#FFD4D4" },
    success:   { background: "#2F9E5E", color: "#fff" },
    ai:        { background: "#F1F4FD", color: "#213A8C", borderColor: "#C5D0F7" },
  };
  const [hover, setHover] = React.useState(false);
  const hoverStyles = {
    primary:   { background: "#2C49B8" },
    secondary: { background: "#F4F7FB" },
    ghost:     { background: "#F4F7FB" },
    danger:    { background: "#FFF0F0" },
    success:   { background: "#268F52" },
    ai:        { background: "#E5EBFB" },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ ...base, ...sizes[size], ...variants[variant], ...(hover ? hoverStyles[variant] : {}) }}
    >
      {leftIcon}
      {children}
      {rightIcon}
    </button>
  );
}
window.Button = Button;
</script>

function AIBadge({ vendor, size = "md" }) {
  const s = size === "sm" ? { w: 24, h: 24, font: 11 } : { w: 32, h: 32, font: 14 };
  return (
    <div style={{
      width: s.w, height: s.h, borderRadius: 8,
      background: vendor.accent, color: "#fff",
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      fontSize: s.font, fontWeight: 700, flexShrink: 0,
    }}>{vendor.avatar}</div>
  );
}

function VerdictPill({ verdict }) {
  const v = {
    pass: { bg: "#ECFAF1", fg: "#2F9E5E", border: "#BBE9CC", ico: "✓", label: "통과" },
    warn: { bg: "#FFF7EC", fg: "#D98023", border: "#FFE0BA", ico: "!", label: "보완" },
    fail: { bg: "#FFF0F0", fg: "#D14343", border: "#FFD4D4", ico: "✗", label: "필수보완" },
  }[verdict];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      padding: "2px 8px", borderRadius: 999,
      background: v.bg, color: v.fg, border: `1px solid ${v.border}`,
      fontSize: 10.5, fontWeight: 700,
    }}>
      <span>{v.ico}</span> {v.label}
    </span>
  );
}

function ItemRow({ c, v, note }) {
  const tone = {
    pass: { c: "#2F9E5E", ico: "✓" },
    warn: { c: "#D98023", ico: "!" },
    fail: { c: "#D14343", ico: "✗" },
  }[v];
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "6px 0", borderBottom: "1px dashed #ECEFF5" }}>
      <span style={{ color: tone.c, fontWeight: 700, fontSize: 13, lineHeight: 1.5, width: 12, flexShrink: 0 }}>{tone.ico}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 11.5, fontWeight: 700, color: "#0F1A36" }}>{c}</div>
        <div style={{ fontSize: 11, color: "#5B6685", lineHeight: 1.5, marginTop: 1 }}>{note}</div>
      </div>
    </div>
  );
}

      {isChosen && (

          ✓ 채택

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#0F1A36" }}>{vendor.short}</div>

        <div style={{ fontSize: 11, fontWeight: 700, color: vendor.accent, marginBottom: 3 }}>{review.scoreLabel}</div>

      <div>
        <div style={{ fontSize: 10, fontWeight: 700, color: "#7C87A4", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 5 }}>항목별 검토</div>

        <div style={{ fontSize: 11.5, color: "#1F2A4A", lineHeight: 1.55 }}>{review.suggestion}</div>

        fontSize: 12, fontWeight: 700,
        cursor: "pointer", fontFamily: "var(--font-sans)",
        transition: "all 140ms ease-out",
      }}>
        {isChosen ? "✓ 채택된 의견" : "이 의견 채택"}
      </button>
    </div>
  );
}

function ConsensusBar({ pass, warn, fail }) {
  const total = pass + warn + fail;
  return (
    <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", background: "#F4F7FB" }}>
      {pass > 0 && <div style={{ flex: pass, background: "#2F9E5E" }}/>}
      {warn > 0 && <div style={{ flex: warn, background: "#D98023" }}/>}
      {fail > 0 && <div style={{ flex: fail, background: "#D14343" }}/>}
    </div>
  );
}

          <span style={{ padding: "3px 10px", borderRadius: 999, background: krData.format === "수치" ? "#E5EBFB" : "#F0E9FB", color: krData.format === "수치" ? "#213A8C" : "#7C4DD9", fontSize: 11, fontWeight: 600 }}>{krData.format}형</span>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: "#0F1A36", flex: 1, lineHeight: 1.5 }}>
            {krData.title.split("·").slice(1).join("·").trim()}
          </div>
        </div>

        {/* 3 AI cards side-by-side */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, marginBottom: 18 }}>
          {AI_VENDORS.map(v => (
            <AIReviewCard
              key={v.id}
              vendor={v}
              review={krData.reviews[v.id]}
              krNum={activeKR}
              isChosen={chosen[activeKR] === v.id}
              onChoose={() => setChosen({ ...chosen, [activeKR]: chosen[activeKR] === v.id ? null : v.id })}
            />
          ))}
        </div>

        {/* Merged synthesis card */}
        <div style={{ background: "linear-gradient(135deg, #1B2A4E, #2C3E68)", color: "#fff", borderRadius: 14, padding: "22px 26px", marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 14 }}>
            <div style={{ width: 36, height: 36, borderRadius: 11, background: "rgba(63,193,209,0.22)", color: "#3FC1D1", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>⚗️</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>3개 AI 종합 의견 (합집합)</div>
              <div style={{ fontSize: 11.5, color: "#91A6F0", marginTop: 2 }}>{krData.title.split("·")[0].trim()} · 공통 / 차이 의견 정리</div>
            </div>
            <Button variant="ai" size="sm" leftIcon={<span>⚗️</span>}>합집합으로 자동 반영</Button>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            {/* 공통 */}
            <div style={{ padding: "14px 16px", background: "rgba(187, 233, 204, 0.08)", border: "1px solid rgba(187, 233, 204, 0.30)", borderRadius: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#A3E5BD", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8 }}>✓ 3사 공통 의견</div>
              <ul style={{ margin: 0, paddingLeft: 16, fontSize: 12.5, color: "#E5EBFB", lineHeight: 1.65 }}>
                {activeKR === "kr1" && <>
                  <li>측정 기준(p95)·도구(APM)·집계 주기가 명확</li>
                  <li>850→500ms는 도전적이면서 달성 가능한 수치</li>
                </>}
                {activeKR === "kr2" && <>
                  <li>회귀 장애 영역 100% 커버 — 근거 강력</li>
                  <li>Jest coverage 자동 수집으로 측정 가능</li>
                </>}
                {activeKR === "kr3" && <>
                  <li>마일스톤 자동화 시도 자체는 도전적이고 가치 있음</li>
                  <li>각 단계의 산출물·완료 기준 정의가 부족하다는 점에 3사 모두 동의</li>
                </>}
              </ul>
            </div>

            {/* 차이 */}
            <div style={{ padding: "14px 16px", background: "rgba(255, 195, 100, 0.08)", border: "1px solid rgba(255, 195, 100, 0.30)", borderRadius: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#FFC369", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8 }}>! AI별 차이 의견</div>
              <ul style={{ margin: 0, paddingLeft: 16, fontSize: 12.5, color: "#E5EBFB", lineHeight: 1.65 }}>
                {activeKR === "kr1" && <>
                  <li><b style={{ color: "#FBD0AC" }}>Claude:</b> SRE 의존성에 주목 — 협업 계획 추가 권장</li>
                  <li><b style={{ color: "#A8DDCB" }}>GPT:</b> C/D 등급 변별력 부족 — 재조정 추천</li>
                  <li><b style={{ color: "#A4C2F4" }}>Gemini:</b> TPS·에러율 보조 지표 추가 권장</li>
                </>}
                {activeKR === "kr2" && <>
                  <li><b style={{ color: "#FBD0AC" }}>Claude:</b> Mutation testing으로 질적 검증 권장</li>
                  <li><b style={{ color: "#A8DDCB" }}>GPT:</b> 가장 높은 점수 — 추가 보완 불필요</li>
                  <li><b style={{ color: "#A4C2F4" }}>Gemini:</b> 기능 개발 일정과의 균형 명시 필요</li>
                </>}
                {activeKR === "kr3" && <>
                  <li><b style={{ color: "#FBD0AC" }}>Claude:</b> 1~4단계 구체 예시 제시</li>
                  <li><b style={{ color: "#A8DDCB" }}>GPT:</b> Definition of Done 작성 권장</li>
                  <li><b style={{ color: "#A4C2F4" }}>Gemini:</b> STEP 5로 복귀 권고 (가장 엄격)</li>
                </>}
              </ul>
            </div>
          </div>
        </div>

        {/* 하단 액션 */}
        <div style={{
          padding: "16px 22px", background: "#fff", border: "1px solid #E1E5EF", borderRadius: 14,
          display: "flex", alignItems: "center", gap: 12,
        }}>
          <div style={{ fontSize: 12.5, color: "#5B6685" }}>
            <b style={{ color: "#0F1A36" }}>KR 3개 모두 의견을 채택</b>하시면 STEP 7에서 채택된 의견 기반으로 최종 수정할 수 있어요.
          </div>
          <div style={{ flex: 1 }}/>
          <Button variant="secondary">전체 합집합 자동 채택</Button>
          {activeKR !== "kr3" && (
            <Button variant="primary" onClick={() => setActiveKR(activeKR === "kr1" ? "kr2" : "kr3")}>
              다음 KR 검토 →
            </Button>
          )}
        </div>

        <WizardNav current={6}/>
      </div>
    </main>
  );
}

window.R1WriteStep6 = R1WriteStep6;
</script>

  function App() { return (<><SidebarR1 active="write"/><R1WriteStep6/></>); }
