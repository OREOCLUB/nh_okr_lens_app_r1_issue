<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OKR LENS — 역할 선택</title>
<style>/* ============================================================
   OKR LENS — Design System
   colors_and_type.css
   사내 OKR 평가·코칭 AI 서비스 — 친근한 SaaS 톤 · 넉넉한 여백
   ============================================================ */

/* ---------- 1. Fonts ---------- */
@font-face {
  font-family: 'Pretendard';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
}
@font-face {
  font-family: 'Pretendard';
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 400;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url('./fonts/JetBrainsMono-Medium.woff2') format('woff2');
}

:root {
  /* ---------- 2. Color — Brand / Primary (Friendly Blue) ---------- */
  /* 참고 이미지의 SSO 버튼/CTA 컬러에서 추출. 인디고가 아닌 더 밝은 'Friendly Blue'. */
  --brand-900: #142250;   /* deepest — text accent on light bg */
  --brand-800: #1B2A4E;   /* dark navy — sidebar, hero text accent (참고 이미지 좌측 다크 카드) */
  --brand-700: #213A8C;
  --brand-600: #2C49B8;
  --brand-500: #3B5BDB;   /* PRIMARY — SSO 버튼 컬러 */
  --brand-400: #5C7AE6;
  --brand-300: #91A6F0;
  --brand-200: #C5D0F7;
  --brand-100: #E5EBFB;
  --brand-50:  #F1F4FD;

  /* ---------- 3. Role Accents (3역할 컬러 코딩) ---------- */
  /* 참고 이미지: 피평가자=블루, 평가자=그린, 인사담당자=오렌지/코랄 */
  --role-r1-bg:   #E8F0FF;
  --role-r1-fg:   #3B5BDB;
  --role-r1-mark: #3B5BDB;

  --role-r2-bg:   #E3F4EA;
  --role-r2-fg:   #2F9E5E;
  --role-r2-mark: #2F9E5E;

  --role-r3-bg:   #FFEDE2;
  --role-r3-fg:   #E07A3C;
  --role-r3-mark: #E07A3C;

  /* ---------- 4. Color — Neutrals (Cool Slate, softer than v1) ---------- */
  --ink-900: #0F1A36;     /* heading */
  --ink-800: #1F2A4A;
  --ink-700: #3A4565;     /* body strong */
  --ink-600: #5B6685;     /* body */
  --ink-500: #7C87A4;     /* secondary */
  --ink-400: #A4ADC4;     /* tertiary, icon */
  --ink-300: #C8CFDF;     /* disabled */
  --ink-200: #E1E5EF;     /* divider */
  --ink-150: #ECEFF5;
  --ink-100: #F4F7FB;     /* PAGE BACKGROUND — 참고 이미지 베이스 */
  --ink-50:  #F9FAFC;
  --ink-0:   #FFFFFF;

  /* ---------- 5. Color — Semantic (Status) ---------- */
  /* 친근한 톤 — 채도 더 낮춤. "코칭" 시선 유지. */
  --risk-high-fg:   #D14343;
  --risk-high-bg:   #FFF0F0;
  --risk-high-bd:   #FFD4D4;

  --risk-mid-fg:    #D98023;
  --risk-mid-bg:    #FFF7EC;
  --risk-mid-bd:    #FFE0BA;

  --risk-low-fg:    #2F9E5E;
  --risk-low-bg:    #ECFAF1;
  --risk-low-bd:    #BBE9CC;

  --info-fg:        #2B5DD9;
  --info-bg:        #EFF4FE;
  --info-bd:        #C5D5F7;

  /* ---------- 6. Status — 승인 enum (D5) ---------- */
  --status-draft-fg:    #5B6685;
  --status-draft-bg:    #F1F3F8;
  --status-pending-fg:  #2B5DD9;
  --status-pending-bg:  #EFF4FE;
  --status-approved-fg: #2F9E5E;
  --status-approved-bg: #ECFAF1;
  --status-rejected-fg: #D14343;
  --status-rejected-bg: #FFF0F0;
  --status-adjust-fg:   #D98023;
  --status-adjust-bg:   #FFF7EC;

  /* ---------- 7. Difficulty / Grade ---------- */
  --diff-high: #7C4DD9;
  --diff-mid:  #3B5BDB;
  --diff-low:  #7C87A4;

  --grade-s: #6B47E0;
  --grade-a: #3B5BDB;
  --grade-b: #2F9E5E;
  --grade-c: #D98023;
  --grade-d: #7C87A4;

  /* ---------- 8. Data viz / Heatmap ---------- */
  --heat-0: #F1F4FD;
  --heat-1: #DCE3F8;
  --heat-2: #B7C4F0;
  --heat-3: #8FA1E5;
  --heat-4: #5C7AE6;
  --heat-5: #3B5BDB;

  /* ---------- 9. Typography — Stacks ---------- */
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial,
               'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular,
               'SF Mono', Consolas, 'Liberation Mono', monospace;

  /* ---------- 10. Type — Sizes & line-heights ---------- */
  /* base 15px — 참고 이미지의 넉넉한 밀도에 맞춰 한 단계 키움 */
  --fs-hero:     48px;   /* 랜딩 메인 헤드라인 */
  --fs-display:  36px;
  --fs-h1:       28px;
  --fs-h2:       22px;
  --fs-h3:       18px;
  --fs-body-lg:  16px;
  --fs-body:     15px;   /* body default */
  --fs-sm:       13.5px;
  --fs-xs:       12.5px;
  --fs-micro:    11.5px;

  --lh-tight:    1.25;
  --lh-snug:     1.45;
  --lh-normal:   1.7;
  --lh-relaxed:  1.85;

  --tracking-tight:  -0.025em;
  --tracking-normal: -0.005em;
  --tracking-wide:   0.04em;

  --fw-regular: 400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* ---------- 11. Spacing scale (4pt grid) ---------- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 48px;
  --sp-10: 64px;
  --sp-11: 80px;
  --sp-12: 96px;

  /* ---------- 12. Radius — 더 부드럽게 ---------- */
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;    /* 기본 카드 */
  --radius-xl: 20px;    /* 큰 카드, 패널 */
  --radius-2xl: 28px;   /* 히어로 일러스트 박스 */
  --radius-pill: 999px;

  /* ---------- 13. Shadow / Elevation — 부드럽고 옅음 ---------- */
  --shadow-xs: 0 1px 2px rgba(31, 42, 74, 0.04);
  --shadow-sm: 0 2px 6px rgba(31, 42, 74, 0.05);
  --shadow-md: 0 6px 16px -4px rgba(31, 42, 74, 0.08);
  --shadow-lg: 0 16px 40px -10px rgba(31, 42, 74, 0.10);
  --shadow-xl: 0 30px 60px -16px rgba(31, 42, 74, 0.16);
  --shadow-focus: 0 0 0 4px rgba(59, 91, 219, 0.16);
  --shadow-card-hover: 0 12px 28px -8px rgba(59, 91, 219, 0.18);

  /* ---------- 14. Borders ---------- */
  --bd-subtle: 1px solid var(--ink-150);
  --bd-default: 1px solid var(--ink-200);
  --bd-strong: 1px solid var(--ink-300);
  --bd-focus: 1.5px solid var(--brand-500);

  /* ---------- 15. Motion ---------- */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 320ms;

  /* ---------- 16. Layout ---------- */
  --sidebar-w: 256px;
  --topbar-h: 64px;
  --content-max: 1440px;
  --page-pad-x: 40px;
  --page-pad-y: 32px;
}

/* ============================================================
   Semantic typography classes
   ============================================================ */
.ds-hero {
  font-family: var(--font-sans);
  font-size: var(--fs-hero);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-display {
  font-family: var(--font-sans);
  font-size: var(--fs-display);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--ink-900);
}
.ds-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-h3);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--ink-900);
}
.ds-body {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-600);
}
.ds-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--ink-500);
}
.ds-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--ink-700);
  font-feature-settings: "tnum" 1;
}
.ds-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

.ds-reset, .ds-reset * { box-sizing: border-box; }
.ds-reset {
  font-family: var(--font-sans);
  color: var(--ink-600);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   OKR LENS Responsive — 2026 리브랜드
   ============================================================ */
* { box-sizing: border-box; }
html, body { max-width: 100%; overflow-x: auto; }
body { font-size: 16px; }

/* 사이드바 반응형: 태블릿 이하 아이콘만, 모바일 오프캔버스 */
.okrlens-sidebar,
aside[class*="Sidebar"] {
  transition: width 220ms cubic-bezier(.16,1,.3,1);
}
@media (max-width: 1024px) {
  .okrlens-sidebar { width: 76px !important; min-width: 76px !important; padding-left: 10px !important; padding-right: 10px !important; }
  .okrlens-sidebar > div:first-child > span:not(:first-child),
  .okrlens-sidebar > div:first-child > span:last-child { display: none !important; }
  .okrlens-sidebar > div:first-child { justify-content: center !important; padding: 4px 0 22px !important; }
  .okrlens-sidebar a > div span:last-child,
  .okrlens-sidebar > div > div:last-child > div:last-child { display: none !important; }
  .okrlens-sidebar a > div,
  .okrlens-sidebar > div > div {
    justify-content: center !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
  }
}
@media (max-width: 900px) {
  .okrlens-sidebar { width: 72px !important; min-width: 72px !important; padding-left: 8px !important; padding-right: 8px !important; }
}
@media (max-width: 640px) {
  .okrlens-sidebar { position: fixed; z-index: 100; height: 100vh; transform: translateX(-100%); }
  .okrlens-sidebar.open { transform: translateX(0); }
  #app > div > div:last-child,
  main { padding-left: 12px !important; padding-right: 12px !important; }
}

/* 페이지 컨텐츠 반응형 여백 */
main, [class*="page-content"] {
  padding-left: clamp(16px, 3vw, 40px);
  padding-right: clamp(16px, 3vw, 40px);
}

/* 카드/그리드 반응형 - 컬럼 자동 스택 */
@media (max-width: 900px) {
  [style*="gridTemplateColumns"][style*="1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
@media (max-width: 640px) {
  [style*="repeat(3, 1fr)"],
  [style*="repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  [style*="gap: 56px"], [style*="gap:56px"] { gap: 24px !important; }
  [style*="gap: 40px"], [style*="gap:40px"] { gap: 20px !important; }
  [style*="padding: \"56px"], [style*="padding: \"48px"] { padding: 24px !important; }
}

/* 상단바 반응형: 780px 이하부터 줄바꿈 */
.okrlens-topbar { padding: 0 32px !important; }
@media (max-width: 780px) {
  .okrlens-topbar {
    flex-wrap: wrap;
    gap: 10px !important;
    padding: 12px 20px !important;
  }
  .okrlens-search { width: 100% !important; order: 10; }
  .okrlens-period { display: none !important; }
}

/* 폰트 크기 가독성 상향 */
body, .ds-body { font-size: 16px; }
h1, .ds-h1 { font-size: clamp(22px, 3vw, 28px); }
h2, .ds-h2 { font-size: clamp(19px, 2.4vw, 22px); }

<script type="text/babel">// RoleSelect.jsx — 로그인 직후 역할 선택 화면

function RoleCardBig({ icon, iconBg, iconFg, title, desc, features, accentColor, href, recommended }) {
  const [hover, setHover] = React.useState(false);
  return (
    <a href={href} style={{ textDecoration: "none" }}>
      <div
        onMouseEnter={() => setHover(true)}
        onMouseLeave={() => setHover(false)}
        style={{
          background: "#fff",
          border: `1.5px solid ${hover ? accentColor : "#E1E5EF"}`,
          borderRadius: 20,
          padding: "32px 28px",
          display: "flex", flexDirection: "column",
          gap: 18,
          cursor: "pointer",
          transition: "all 220ms cubic-bezier(0.16, 1, 0.3, 1)",
          boxShadow: hover
            ? `0 16px 40px -12px ${accentColor}30`
            : "0 1px 2px rgba(31,42,74,.04)",
          transform: hover ? "translateY(-4px)" : "translateY(0)",
          position: "relative",
          height: "100%",
        }}
      >
        {recommended && (
          <div style={{
            position: "absolute", top: 16, right: 16,
            background: accentColor, color: "#fff",
            fontSize: 10.5, fontWeight: 700,
            padding: "3px 9px", borderRadius: 999,
            letterSpacing: "0.02em",
          }}>추천</div>
        )}

        {/* Icon */}
        <div style={{
          width: 68, height: 68, borderRadius: "50%",
          background: iconBg, color: iconFg,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 30,
        }}>{icon}</div>

        {/* Title */}
        <div>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#0F1A36", letterSpacing: "-0.015em" }}>{title}</div>
          <div style={{ fontSize: 13.5, color: "#5B6685", lineHeight: 1.6, marginTop: 6 }}>{desc}</div>
        </div>

        {/* Features */}
        <div style={{
          display: "flex", flexDirection: "column", gap: 8,
          paddingTop: 14, borderTop: "1px solid #ECEFF5",
        }}>
          {features.map((f, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5, color: "#3A4565" }}>
              <span style={{ color: accentColor, fontWeight: 700, fontSize: 13 }}>✓</span>
              {f}
            </div>
          ))}
        </div>

        {/* CTA */}
        <div style={{
          marginTop: "auto", paddingTop: 6,
          display: "flex", alignItems: "center", justifyContent: "space-between",
          color: accentColor, fontSize: 14, fontWeight: 600,
        }}>
          <span>이 역할로 시작하기</span>
          <span style={{
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            width: 28, height: 28, borderRadius: "50%",
            background: hover ? accentColor : `${accentColor}15`,
            color: hover ? "#fff" : accentColor,
            transition: "all 180ms ease-out",
            fontSize: 14,
          }}>→</span>
        </div>
      </div>
    </a>
  );
}

    <div style={{

      fontFamily: "var(--font-sans)", color: "#3A4565",

          </div>
        </a>
        <div style={{ flex: 1 }}/>

        {/* User chip */}
        <div style={{
          display: "flex", alignItems: "center", gap: 10,
          padding: "6px 14px 6px 6px",
          background: "#F4F7FB",
          borderRadius: 999,
        }}>
          <div style={{
            width: 30, height: 30, borderRadius: "50%",
            background: "#3B5BDB", color: "#fff",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 700, fontSize: 12.5,
          }}>정</div>
          <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.2 }}>
            <div style={{ fontSize: 12.5, fontWeight: 600, color: "#0F1A36" }}>정태영 님</div>
            <div style={{ fontSize: 10.5, color: "#7C87A4" }}>운영본부 · 결제플랫폼팀</div>
          </div>
