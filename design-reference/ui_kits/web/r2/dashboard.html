<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>OKR LENS — 평가자 대시보드</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F4F7FB; font-family: var(--font-sans); color: #3A4565; -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  #root { height: 100vh; display: flex; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DCE3F8; border-radius: 6px; border: 2px solid #F4F7FB; }
  ::-webkit-scrollbar-thumb:hover { background: #B7C4F0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../shared/dummyData.js"></script>
<template id="__bundler_thumbnail" data-bg-color="#F4F7FB">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F4F7FB"/>
    <rect x="500" y="320" width="200" height="160" rx="32" fill="#3B5BDB"/>
    <circle cx="600" cy="400" r="36" fill="none" stroke="#fff" stroke-width="8" opacity="0.7"/>
    <circle cx="600" cy="400" r="10" fill="#fff"/>
    <text x="600" y="540" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#0F1A36" text-anchor="middle" letter-spacing="2">OKR LENS</text>
    <text x="600" y="580" font-family="system-ui,sans-serif" font-size="16" fill="#7C87A4" text-anchor="middle">불러오는 중...</text>
  </svg>
</template>
<script src="../shared/notImplemented.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../shared/Icon.jsx"></script>
<script type="text/babel" src="../shared/Badges.jsx"></script>
<script type="text/babel" src="../shared/Button.jsx"></script>
<script type="text/babel" src="./SidebarR2.jsx"></script>
<script type="text/babel" src="../shared/TopBar.jsx"></script>
<script type="text/babel" src="../shared/StatCard.jsx"></script>
<script type="text/babel" src="../shared/MemberTable.jsx"></script>

<script type="text/babel">
// ─────────────────────────────────────────────
// 우측 — 코칭 캘린더 위젯 (이번 달 일정 + 미등록 팀원)
// ─────────────────────────────────────────────
function CalendarWidget() {
  const types = window.OKRDummy.scheduleTypes;
  const events = [
    { date: "06/03", type: "kickoff",  title: "OKR 등록 시작", time: "전일",  focus: false },
    { date: "06/09", type: "oneonone", title: "1on1 — 김태양", time: "14:00", focus: true  },
    { date: "06/12", type: "oneonone", title: "1on1 — 강동우", time: "10:00", focus: true  },
    { date: "06/15", type: "quarter",  title: "분기 미팅",     time: "10:00", focus: false },
    { date: "06/18", type: "etc",      title: "팀 간담회",     time: "15:00", focus: false },
    { date: "06/30", type: "deadline", title: "OKR 등록 마감", time: "18:00", focus: false },
  ];

  return (
    <div style={{ background: "#fff", border: "1px solid #E1E5EF", borderRadius: 14, padding: "18px 20px" }}>
      <div style={{ display: "flex", alignItems: "baseline", marginBottom: 14 }}>
        <div style={{ fontSize: 14.5, fontWeight: 700, color: "#0F1A36" }}>이번 달 일정</div>
        <a href="./r2-calendar.html" style={{ marginLeft: "auto", fontSize: 12, color: "#3B5BDB", fontWeight: 600, textDecoration: "none" }}>캘린더 ›</a>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {events.map((e, i) => {
          const t = types[e.type];
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 9, cursor: "pointer" }}
              onMouseEnter={(ev) => ev.currentTarget.style.background = "#F9FAFC"}
              onMouseLeave={(ev) => ev.currentTarget.style.background = "transparent"}>
              <div style={{
                width: 36, padding: "5px 0",
                background: t.bg, color: t.fg,
                borderRadius: 8, textAlign: "center", flexShrink: 0,
                fontSize: 11, fontWeight: 700, fontFamily: "var(--font-mono)",
                letterSpacing: "-0.01em",
              }}>{e.date}</div>
              <div style={{ width: 22, height: 22, borderRadius: 7, background: t.bg, color: t.fg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, flexShrink: 0 }}>{t.ico}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 12.5, fontWeight: 600, color: "#0F1A36", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title}</span>
                  {e.focus && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#D98023", flexShrink: 0 }} title="집중 코칭 대상자"/>}
                </div>
                <div style={{ fontSize: 10.5, color: "#7C87A4", fontFamily: "var(--font-mono)", marginTop: 1 }}>{e.time}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function UnregisteredCoaching() {
  const members = window.OKRDummy.members.filter(m => m.focus && !m.coaching);
  const others  = window.OKRDummy.members.filter(m => !m.focus && !m.coaching && m.status !== "draft");

  return (
    <div style={{ background: "linear-gradient(135deg, #FFF7EC, #fff 70%)", border: "1px solid #FFE0BA", borderRadius: 14, padding: "16px 18px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <div style={{ width: 28, height: 28, borderRadius: 8, background: "#D98023", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700 }}>!</div>
        <div style={{ fontSize: 13.5, fontWeight: 700, color: "#7A4A14" }}>1on1 코칭 미등록</div>
        <span style={{ marginLeft: "auto", fontSize: 11, color: "#9C5E26", fontFamily: "var(--font-mono)", fontWeight: 600 }}>{members.length + others.length}명</span>
      </div>

      {/* 집중코칭 우선 */}
      {members.length > 0 && (
        <>
          <div style={{ fontSize: 10.5, color: "#7A4A14", fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 6, marginTop: 2 }}>🎯 집중 코칭 대상</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: others.length > 0 ? 10 : 0 }}>
            {members.map((m, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 9,
                padding: "7px 10px", background: "#fff", border: "1px solid #FFE0BA", borderRadius: 8,
              }}>
                <div style={{ width: 24, height: 24, borderRadius: "50%", background: "#FFEDE2", color: "#E07A3C", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 11 }}>{m.name[0]}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#0F1A36" }}>{m.name}</div>
                  <div style={{ fontSize: 10, color: "#9C5E26" }}>{m.grade} · {m.group}</div>
                </div>
                <button style={{ padding: "3px 9px", background: "#D98023", border: "none", borderRadius: 6, color: "#fff", fontSize: 10.5, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font-sans)" }}>1on1 예약</button>
              </div>
            ))}
          </div>
        </>
      )}

      {others.length > 0 && (
        <>
          <div style={{ fontSize: 10.5, color: "#9C5E26", fontWeight: 600, marginBottom: 6 }}>그 외 {others.length}명</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
            {others.slice(0, 8).map((m, i) => (
              <span key={i} style={{ padding: "3px 8px", background: "#fff", border: "1px solid #FFE0BA", borderRadius: 999, fontSize: 11, color: "#7A4A14", fontWeight: 600, cursor: "pointer" }}>{m.name}</span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// Dashboard
// ─────────────────────────────────────────────
function Dashboard() {
  const [filter, setFilter] = React.useState(null);
  const stats = window.OKRDummy.stats;
  const members = window.OKRDummy.members;

  // 인사이트: 즉시 조치 가능한 1~2개 항목만
  const pendingCount = members.filter(m => m.status === "pending").length;
  const focusUnregistered = members.filter(m => m.focus && !m.coaching).length;

  return (
    <main style={{ flex: 1, display: "flex", flexDirection: "column", background: "#F4F7FB", overflow: "hidden" }}>
      <TopBar title="평가자 대시보드" subtitle="운영본부 · 결제플랫폼팀 · 20명"/>
      <div style={{ flex: 1, overflowY: "auto", padding: "26px 32px 40px" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "flex-end", gap: 16, marginBottom: 22 }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#3B5BDB", letterSpacing: "0.04em", textTransform: "uppercase" }}>2026 상반기 · OKR 등록 진행 중</div>
            <h1 style={{ margin: "6px 0 0", fontSize: 28, fontWeight: 700, color: "#0F1A36", letterSpacing: "-0.025em", lineHeight: 1.2 }}>
              팀원 20명의 OKR을 함께 정제합니다
            </h1>
            <p style={{ margin: "5px 0 0", fontSize: 13.5, color: "#5B6685" }}>
              결재 요청 <b style={{ color: "#D14343" }}>{pendingCount}건</b>이 검토를 기다리고 있어요.
              {focusUnregistered > 0 && <> 집중 코칭 미등록자가 <b style={{ color: "#D98023" }}>{focusUnregistered}명</b> 있어요.</>}
            </p>
          </div>
          <div style={{ flex: 1 }}/>
          <a href="./r2-calendar.html" style={{ textDecoration: "none" }}>
            <Button variant="secondary" leftIcon={<Icon name="calendar" size={15}/>}>코칭 캘린더</Button>
          </a>
          <a href="./r2-review.html" style={{ textDecoration: "none" }}>
            <Button variant="primary" leftIcon={<Icon name="clipboard" size={15}/>}>일괄 검토</Button>
          </a>
        </div>

        {/* 6 Stat cards — 명세 (3x2 grid) */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 12,
          marginBottom: 22,
        }}>
          {stats.map((s) => (
            <StatCard
              key={s.id}
              stat={s}
              active={filter === s.id}
              onClick={() => setFilter(filter === s.id ? null : s.id)}
            />
          ))}
        </div>

        {/* Two column */}
        <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) 300px", gap: 18 }}>
          <div style={{ minWidth: 0 }}>
            <MemberTable
              members={members}
              filter={filter}
              selectedId={null}
              onClearFilter={() => setFilter(null)}
              onRowClick={(m) => { window.location.href = `./r2-review.html?member=${m.id}`; }}
            />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <CalendarWidget/>
            <UnregisteredCoaching/>
          </div>
        </div>

        {/* Footer hint */}
        <div style={{
          marginTop: 22, padding: "12px 16px",
          background: "#fff", border: "1px solid #E1E5EF", borderRadius: 10,
          display: "flex", alignItems: "center", gap: 10,
          fontSize: 12.5, color: "#5B6685", lineHeight: 1.55,
        }}>
          <span style={{ fontSize: 14 }}>💡</span>
          상단 카드를 클릭하면 하단 테이블이 해당 상태로 필터링됩니다. AI 위험도는 평가 참고용 신호이며, 확정된 위반이 아닙니다.
        </div>
      </div>
    </main>
  );
}

function App() {
  return (
    <>
      <Sidebar active="dashboard"/>
      <Dashboard/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

</body>
</html>
