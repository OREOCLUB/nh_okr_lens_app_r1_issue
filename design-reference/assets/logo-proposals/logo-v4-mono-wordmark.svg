<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 44" fill="none">
  <!-- Minimal lens mark: two thin concentric circles + dot -->
  <circle cx="22" cy="22" r="15" stroke="#0A1F17" stroke-width="1.4"/>
  <circle cx="22" cy="22" r="7" stroke="#0A1F17" stroke-width="1.4"/>
  <circle cx="22" cy="22" r="2.2" fill="#00A968"/>
  <!-- Divider -->
  <rect x="52" y="10" width="1" height="24" fill="#D6DBE0"/>
  <!-- Wordmark: OKR (bold) LENS (light) -->
  <text x="66" y="30" font-family="Pretendard, -apple-system, sans-serif"
        font-size="22" font-weight="800" fill="#0A1F17" letter-spacing="-0.03em">OKR<tspan
          font-weight="300" letter-spacing="0.02em" fill="#0A1F17"> LENS</tspan></text>
</svg>
