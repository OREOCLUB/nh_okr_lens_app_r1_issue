<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;}
  .swatch{height:70px;border-radius:10px;border:1px solid rgba(15,26,54,.04);position:relative;overflow:hidden;}
  .swatch.dark .label, .swatch.dark .hex{color:#fff;}
  .swatch.light .label, .swatch.light .hex{color:#0A1F17;}
  .label{position:absolute;left:9px;bottom:7px;font-size:11px;font-weight:700;letter-spacing:.02em;}
  .hex{position:absolute;right:9px;top:7px;font-family:var(--font-mono);font-size:9.5px;opacity:.78;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .name{font-size:14px;font-weight:600;color:#0A1F17;}
  .meta{font-size:12px;color:#6B7770;}
  .desc{font-size:12px;color:#6B7770;margin-top:12px;line-height:1.55;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="name">Brand · Ink + Green Accent</div><div class="meta">Primary palette · 50–900</div></div>
  <div class="row">
    <div class="swatch light" style="background:#F1FBF6"><span class="hex">F1FBF6</span><span class="label">50</span></div>
    <div class="swatch light" style="background:#E0F7EC"><span class="hex">E0F7EC</span><span class="label">100</span></div>
    <div class="swatch light" style="background:#B9F1D8"><span class="hex">B9F1D8</span><span class="label">200</span></div>
    <div class="swatch light" style="background:#7CE9BE"><span class="hex">7CE9BE</span><span class="label">300</span></div>
    <div class="swatch dark"  style="background:#3EDDA1"><span class="hex">3EDDA1</span><span class="label">400</span></div>
    <div class="swatch dark"  style="background:#00A968"><span class="hex">00A968</span><span class="label">500</span></div>
    <div class="swatch dark"  style="background:#008F58"><span class="hex">008F58</span><span class="label">600</span></div>
    <div class="swatch dark"  style="background:#007048"><span class="hex">007048</span><span class="label">700</span></div>
    <div class="swatch dark"  style="background:#14342B"><span class="hex">14342B</span><span class="label">800</span></div>
    <div class="swatch dark"  style="background:#0A1F17"><span class="hex">0A1F17</span><span class="label">900</span></div>
  </div>
  <div class="desc">Primary CTA · 활성 상태 · 차트 메인 시리즈. SSO 버튼 = 500 · 사이드바 딥 잉크 = 900 · 호버 = 600. 딥 잉크(900)와 액센트 그린(500)의 명료한 대비가 이 브랜드의 시그니처.</div>
</div></body></html>
