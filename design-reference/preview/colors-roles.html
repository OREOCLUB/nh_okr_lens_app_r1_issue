<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .name{font-size:14px;font-weight:600;color:#0A1F17;}
  .meta{font-size:12px;color:#6B7770;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .card{border:1px solid #E5E7E4;border-radius:14px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;background:#fff;}
  .ico{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;}
  .role-name{font-size:14px;font-weight:600;color:#0A1F17;}
  .role-desc{font-size:11.5px;color:#6B7770;text-align:center;line-height:1.5;}
  .hex{font-family:var(--font-mono);font-size:10px;color:#8CA599;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="name">Role Accents</div><div class="meta">3역할 컬러 코딩 — 카드 / 아바타 / 배지 (사이드바 브랜드와 별개)</div></div>
  <div class="grid">
    <div class="card">
      <div class="ico" style="background:#E5EBFB;color:#3B5BDB">👤</div>
      <div class="role-name">피평가자 · R1</div>
      <div class="role-desc">나의 OKR 작성·확인</div>
      <div class="hex">#3B5BDB · #E5EBFB</div>
    </div>
    <div class="card">
      <div class="ico" style="background:#E0F7EC;color:#00A968">👥</div>
      <div class="role-name">평가자 · R2</div>
      <div class="role-desc">팀원 OKR 검토·코칭</div>
      <div class="hex">#00A968 · #E0F7EC</div>
    </div>
    <div class="card">
      <div class="ico" style="background:#FFEDE2;color:#E07A3C">🛡️</div>
      <div class="role-name">인사담당자 · R3</div>
      <div class="role-desc">전사 인사이트·기준</div>
      <div class="hex">#E07A3C · #FFEDE2</div>
    </div>
  </div>
</div></body></html>
