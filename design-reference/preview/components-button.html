<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-500);margin:8px 0 10px;}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
  button{font-family:var(--font-sans);font-size:14px;font-weight:600;border-radius:10px;padding:10px 18px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;line-height:1;letter-spacing:-0.005em;}
  .btn-primary{background:#00A968;color:#fff;box-shadow:0 1px 2px rgba(31,42,74,.08);}
  .btn-primary.hover{background:#008F58;}
  .btn-secondary{background:#fff;color:#1F2A4A;border-color:#C8CFDF;}
  .btn-secondary.hover{background:#F4F7FB;}
  .btn-ghost{background:transparent;color:#3A4565;}
  .btn-ghost.hover{background:#F4F7FB;}
  .btn-danger{background:#fff;color:#D14343;border-color:#FFD4D4;}
  .btn-success{background:#2F9E5E;color:#fff;}
  .btn-ai{background:#F1FBF6;color:#007048;border-color:#B9F1D8;}
  .btn-sm{font-size:12.5px;padding:7px 12px;}
  .btn-lg{font-size:15px;padding:12px 22px;}
  .state{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-400);width:64px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Buttons</div><div class="meta">Primary · Secondary · Ghost · Danger · Success · AI</div></div>

  <div class="section-label">Variants</div>
  <div class="row">
    <button class="btn-primary">사내 계정으로 로그인</button>
    <button class="btn-secondary">취소</button>
    <button class="btn-ghost">상세 보기</button>
    <button class="btn-success">✓ 승인</button>
    <button class="btn-danger">반려</button>
    <button class="btn-ai">✨ AI 코칭 받기</button>
  </div>

  <div class="section-label">States — Primary</div>
  <div class="row">
    <span class="state">default</span>
    <button class="btn-primary">제출하기</button>
    <span class="state">hover</span>
    <button class="btn-primary hover">제출하기</button>
    <span class="state">disabled</span>
    <button class="btn-primary" disabled style="opacity:.42;cursor:not-allowed">제출하기</button>
    <span class="state">focus</span>
    <button class="btn-primary" style="box-shadow:0 0 0 4px rgba(0,169,104,.16)">제출하기</button>
  </div>

  <div class="section-label">Size</div>
  <div class="row">
    <button class="btn-primary btn-sm">작은 버튼</button>
    <button class="btn-primary">기본 버튼</button>
    <button class="btn-primary btn-lg">큰 버튼</button>
  </div>
</div></body></html>
