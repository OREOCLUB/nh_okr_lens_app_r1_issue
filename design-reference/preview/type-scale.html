<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:20px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .row{display:grid;grid-template-columns:100px 1fr;align-items:baseline;padding:8px 0;border-bottom:1px solid #ECEFF5;}
  .row:last-child{border-bottom:none;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);}
  .px{color:var(--ink-400);margin-left:8px;}
  .sample{color:var(--ink-900);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Type Scale</div><div class="meta">Pretendard · Base 15px · 넉넉한 위계</div></div>
  <div class="row"><div class="tok">hero<span class="px">48 · 700</span></div><div class="sample" style="font-size:44px;font-weight:700;line-height:1.15;letter-spacing:-0.025em">성과를 연결하고,</div></div>
  <div class="row"><div class="tok">display<span class="px">36 · 700</span></div><div class="sample" style="font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.02em">팀원 14명의 OKR</div></div>
  <div class="row"><div class="tok">h1<span class="px">28 · 600</span></div><div class="sample" style="font-size:26px;font-weight:600;line-height:1.35;letter-spacing:-0.02em">검토 대시보드</div></div>
  <div class="row"><div class="tok">h2<span class="px">22 · 600</span></div><div class="sample" style="font-size:21px;font-weight:600;line-height:1.4">팀원 OKR 현황</div></div>
  <div class="row"><div class="tok">h3<span class="px">18 · 600</span></div><div class="sample" style="font-size:17px;font-weight:600;line-height:1.4">AI 코칭 인사이트</div></div>
  <div class="row"><div class="tok">body<span class="px">15 · 400</span></div><div class="sample" style="font-size:15px;font-weight:400;line-height:1.6;color:#3A4565">KR 4~6개 범위에서 작성합니다. 운영안 가이드를 참고해주세요.</div></div>
  <div class="row"><div class="tok">sm<span class="px">13.5 · 400</span></div><div class="sample" style="font-size:13.5px;font-weight:400;color:#5B6685">2026.07.15 제출 · 평가자 검토 대기</div></div>
  <div class="row"><div class="tok">xs<span class="px">12.5 · 500</span></div><div class="sample" style="font-size:12.5px;font-weight:500;color:#7C87A4">KR_2026_001 · 업무군 성능/튜닝</div></div>
</div></body></html>
