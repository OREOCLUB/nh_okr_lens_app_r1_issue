<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:20px 24px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{text-align:left;font-size:11px;font-weight:700;color:var(--ink-500);letter-spacing:.04em;text-transform:uppercase;padding:11px 14px;background:#F9FAFC;border-bottom:1px solid #E1E5EF;}
  tbody td{padding:13px 14px;border-bottom:1px solid #ECEFF5;color:var(--ink-800);vertical-align:middle;}
  tbody tr.selected td{background:#F1FBF6;}
  .grade{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-500);}
  .name{font-weight:600;color:var(--ink-900);}
  .obj{font-size:11.5px;color:var(--ink-500);margin-top:2px;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid;}
  .pill .dot{width:5px;height:5px;border-radius:50%;}
  .av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Member OKR Table</div><div class="meta">팀원 OKR 현황 — 평가자(R2) 화면</div></div>
  <table>
    <thead><tr>
      <th>이름 / 직급</th><th>업무군</th><th>제출일</th><th>상태</th><th>위험도</th>
    </tr></thead>
    <tbody>
      <tr class="selected">
        <td><div style="display:flex;align-items:center;gap:10px"><div class="av" style="background:#E0F7EC;color:#007048">김</div><div><div class="name">김지훈 <span class="grade">4급갑 · SE</span></div><div class="obj">결제 게이트웨이 응답속도 개선</div></div></div></td>
        <td>성능/튜닝</td>
        <td style="font-family:var(--font-mono);color:#5B6685">07/12</td>
        <td><span class="pill" style="background:#EFF4FE;border-color:#C5D5F7;color:#2B5DD9"><span class="dot" style="background:#2B5DD9"></span>제출</span></td>
        <td><span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023">코칭 · 중</span></td>
      </tr>
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="av" style="background:#E3F4EA;color:#2F9E5E">박</div><div><div class="name">박서연 <span class="grade">4급을 · SE</span></div><div class="obj">야간 배치 장애 ZERO 운영</div></div></div></td>
        <td>장애/운영안정</td>
        <td style="font-family:var(--font-mono);color:#5B6685">07/11</td>
        <td><span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343"><span class="dot" style="background:#D14343"></span>반려</span></td>
        <td><span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343">코칭 · 상</span></td>
      </tr>
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="av" style="background:#FFEDE2;color:#E07A3C">이</div><div><div class="name">이도윤 <span class="grade">3급 · PM</span></div><div class="obj">운영 자동화 파이프라인</div></div></div></td>
        <td>자동화</td>
        <td style="font-family:var(--font-mono);color:#5B6685">07/10</td>
        <td><span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023"><span class="dot" style="background:#D98023"></span>조정요청</span></td>
        <td><span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023">코칭 · 중</span></td>
      </tr>
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="av" style="background:#E0F7EC;color:#007048">정</div><div><div class="name">정민재 <span class="grade">4급을 · SE</span></div><div class="obj">결제 인증모듈 리팩토링</div></div></div></td>
        <td>개발/요건</td>
        <td style="font-family:var(--font-mono);color:#5B6685">07/08</td>
        <td><span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E"><span class="dot" style="background:#2F9E5E"></span>승인</span></td>
        <td><span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E">양호 · 하</span></td>
      </tr>
    </tbody>
  </table>
</div></body></html>
