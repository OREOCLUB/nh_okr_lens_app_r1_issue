<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .card{border:1px solid var(--ink-200);border-radius:14px;padding:18px 14px;text-align:center;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid;}
  .pill .dot{width:6px;height:6px;border-radius:50%;}
  .name{font-size:11.5px;color:var(--ink-500);margin-top:10px;font-family:var(--font-mono);}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .arrow{display:flex;justify-content:center;align-items:center;gap:5px;margin-top:14px;font-size:12px;color:var(--ink-500);}
  .arrow .a{font-family:var(--font-mono);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Approval Status</div><div class="meta">작성중 → 제출 → (승인 | 반려 | 조정요청)</div></div>
  <div class="row">
    <div class="card">
      <span class="pill" style="background:#F1F3F8;border-color:#E1E5EF;color:#5B6685"><span class="dot" style="background:#7C87A4"></span>작성중</span>
      <div class="name">draft</div>
    </div>
    <div class="card">
      <span class="pill" style="background:#EFF4FE;border-color:#C5D5F7;color:#2B5DD9"><span class="dot" style="background:#2B5DD9"></span>제출 · 대기</span>
      <div class="name">submitted</div>
    </div>
    <div class="card">
      <span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E"><span class="dot" style="background:#2F9E5E"></span>승인</span>
      <div class="name">approved</div>
    </div>
    <div class="card">
      <span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343"><span class="dot" style="background:#D14343"></span>반려</span>
      <div class="name">rejected</div>
    </div>
    <div class="card">
      <span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023"><span class="dot" style="background:#D98023"></span>조정요청</span>
      <div class="name">adjustment</div>
    </div>
  </div>
  <div class="arrow"><span class="a">작성중</span> → <span class="a">제출</span> → <span class="a">(승인 | 반려 | 조정요청)</span></div>
</div></body></html>
