<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .row{display:grid;grid-template-columns:160px 1fr;align-items:baseline;padding:8px 0;border-bottom:1px solid #ECEFF5;}
  .row:last-child{border:none;}
  .label{font-size:12px;color:var(--ink-500);font-weight:500;}
  .mono{font-family:var(--font-mono);color:var(--ink-800);font-feature-settings:"tnum" 1;}
  .num{font-family:var(--font-sans);font-variant-numeric:tabular-nums;color:var(--ink-900);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">JetBrains Mono · Tabular</div><div class="meta">KR ID · 측정 수치 · 코드 · 표 안 데이터</div></div>
  <div class="row"><div class="label">KR ID</div><div class="mono" style="font-size:14px">KR_2026_001 / KR_2026_002</div></div>
  <div class="row"><div class="label">측정값</div><div class="mono" style="font-size:14px">850ms → 500ms (p95 APM)</div></div>
  <div class="row"><div class="label">달성률</div><div class="num" style="font-size:20px;font-weight:600">87.4% <span style="font-size:13px;color:#7C87A4;font-weight:500">/ 목표 90%</span></div></div>
  <div class="row"><div class="label">대시보드 hero</div><div class="num" style="font-size:32px;font-weight:700;color:#0A1F17;letter-spacing:-0.02em">72<span style="font-size:16px;color:#7C87A4;font-weight:500;margin-left:4px">%</span></div></div>
  <div class="row"><div class="label">날짜·시간</div><div class="mono" style="font-size:13.5px">2026-07-15 14:32 KST</div></div>
  <div class="row"><div class="label">가중치 / 점수</div><div class="num" style="font-size:14.5px;font-weight:600">30% · 합산 108 / 110</div></div>
</div></body></html>
