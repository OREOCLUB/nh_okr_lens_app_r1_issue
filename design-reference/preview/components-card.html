<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#F4F7FB;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{background:#fff;border:1px solid #E1E5EF;border-radius:14px;padding:20px;box-shadow:0 1px 2px rgba(31,42,74,.04);}
  .label-row{display:flex;align-items:center;gap:8px;}
  .ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .label{font-size:12.5px;font-weight:500;color:var(--ink-500);}
  .num{font-size:32px;font-weight:700;color:var(--ink-900);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1;margin-top:10px;}
  .num .u{font-size:15px;color:var(--ink-500);font-weight:500;margin-left:4px;}
  .sub{font-size:11.5px;color:var(--ink-500);margin-top:8px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Dashboard Cards</div><div class="meta">미리보기 카드 — 친근한 SaaS 톤</div></div>
  <div class="grid">
    <div class="card">
      <div class="label-row">
        <div class="ico" style="background:#E0F7EC;color:#00A968">🎯</div>
        <div class="label">OKR 달성률</div>
      </div>
      <div class="num">72<span class="u">%</span></div>
      <div class="sub" style="color:#2F9E5E">↑ 8% 전월 대비</div>
    </div>
    <div class="card">
      <div class="label-row">
        <div class="ico" style="background:#ECFAF1;color:#2F9E5E">✓</div>
        <div class="label">나의 핵심결과</div>
      </div>
      <div class="num">8<span class="u">/ 11</span></div>
      <div class="sub">진행 중</div>
    </div>
    <div class="card">
      <div class="label-row">
        <div class="ico" style="background:#FFEDE2;color:#E07A3C">👥</div>
        <div class="label">피드백 받은 수</div>
      </div>
      <div class="num">14</div>
      <div class="sub">이번 분기</div>
    </div>
    <div class="card">
      <div class="label-row">
        <div class="ico" style="background:#F0E9FB;color:#7C4DD9">✨</div>
        <div class="label">AI 코칭 제안</div>
      </div>
      <div class="num">5</div>
      <div class="sub">새로운 제안</div>
    </div>
  </div>
</div></body></html>
