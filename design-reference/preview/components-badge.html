<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .section{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-500);margin:10px 0 8px;}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid;}
  .pill .dot{width:6px;height:6px;border-radius:50%;}
  .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:500;background:#F4F7FB;color:var(--ink-700);}
  .tag.brand{background:#F1FBF6;color:#007048;}
  .tag.green{background:#ECFAF1;color:#2F9E5E;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Badges</div><div class="meta">Status · Risk · Difficulty · Issue tag</div></div>

  <div class="section">Status</div>
  <div class="row">
    <span class="pill" style="background:#F1F3F8;border-color:#E1E5EF;color:#5B6685"><span class="dot" style="background:#7C87A4"></span>작성중</span>
    <span class="pill" style="background:#EFF4FE;border-color:#C5D5F7;color:#2B5DD9"><span class="dot" style="background:#2B5DD9"></span>제출</span>
    <span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E"><span class="dot" style="background:#2F9E5E"></span>승인</span>
    <span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343"><span class="dot" style="background:#D14343"></span>반려</span>
    <span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023"><span class="dot" style="background:#D98023"></span>조정요청</span>
  </div>

  <div class="section">Risk · 코칭 후보</div>
  <div class="row">
    <span class="pill" style="background:#FFF0F0;border-color:#FFD4D4;color:#D14343">코칭 · 상</span>
    <span class="pill" style="background:#FFF7EC;border-color:#FFE0BA;color:#D98023">코칭 · 중</span>
    <span class="pill" style="background:#ECFAF1;border-color:#BBE9CC;color:#2F9E5E">양호 · 하</span>
  </div>

  <div class="section">Difficulty / Grade</div>
  <div class="row">
    <span class="pill" style="background:#F0E9FB;border-color:#D8C5F2;color:#7C4DD9">난이도 · 상</span>
    <span class="pill" style="background:#E0F7EC;border-color:#B9F1D8;color:#007048">난이도 · 중</span>
    <span class="pill" style="background:#F1F3F8;border-color:#E1E5EF;color:#5B6685">난이도 · 하</span>
    <span class="pill" style="background:#00A968;border-color:transparent;color:#fff;font-family:var(--font-mono)">등급 A</span>
    <span class="pill" style="background:#2F9E5E;border-color:transparent;color:#fff;font-family:var(--font-mono)">등급 B</span>
  </div>

  <div class="section">Issue tag</div>
  <div class="row">
    <span class="tag brand">C05 측정모호</span>
    <span class="tag brand">C06 건수형</span>
    <span class="tag brand">C11 통제밖</span>
    <span class="tag">자기보고형</span>
    <span class="tag">현상유지</span>
    <span class="tag green">업무군 · 성능/튜닝</span>
  </div>
</div></body></html>
