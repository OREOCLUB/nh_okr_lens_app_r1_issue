<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:20px 24px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .tile{border:1px solid #E1E5EF;border-radius:14px;padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;}
  .tile.dark{background:#0A1F17;border-color:#0A1F17;}
  .tile.tint{background:#F4F7FB;}
  .tile img{height:36px;}
  .lab{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-500);}
  .tile.dark .lab{color:#A4ADC4;}
  .marks{display:flex;gap:16px;align-items:center;margin-top:14px;border-top:1px solid #ECEFF5;padding-top:14px;}
  .mark-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .mark-item img{width:42px;height:42px;}
  .mark-lab{font-size:10.5px;color:var(--ink-500);}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Logo · OKR LENS</div><div class="meta">마크 + 워드마크 · light / dark / tinted</div></div>
  <div class="grid">
    <div class="tile"><img src="../assets/logo.svg" alt=""><div class="lab">on white</div></div>
    <div class="tile tint"><img src="../assets/logo.svg" alt=""><div class="lab">on ink-100</div></div>
    <div class="tile dark"><img src="../assets/logo-white.svg" alt=""><div class="lab">on brand-800</div></div>
  </div>
  <div class="marks">
    <div class="mark-item"><img src="../assets/logo-mark.svg" alt=""><div class="mark-lab">mark</div></div>
    <div class="mark-item" style="background:#0A1F17;border-radius:10px;padding:6px"><img src="../assets/logo-mark.svg" alt=""><div class="mark-lab" style="color:#A4ADC4">mark · dark</div></div>
  </div>
</div></body></html>
