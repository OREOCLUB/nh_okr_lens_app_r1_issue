<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px;}
  .swatch{height:70px;border-radius:10px;border:1px solid rgba(15,26,54,.04);position:relative;}
  .swatch.dark .label, .swatch.dark .hex{color:#fff;}
  .swatch.light .label, .swatch.light .hex{color:var(--ink-900);}
  .label{position:absolute;left:7px;bottom:6px;font-size:11px;font-weight:700;}
  .hex{position:absolute;right:7px;top:6px;font-family:var(--font-mono);font-size:9px;opacity:.78;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .desc{font-size:12px;color:var(--ink-500);margin-top:12px;line-height:1.55;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="name">Neutral · Cool Slate</div><div class="meta">텍스트 · 표면 · 디바이더 · 페이지 배경(100)</div></div>
  <div class="row">
    <div class="swatch light" style="background:#FFFFFF;border-color:#ECEFF5"><span class="hex">FFF</span><span class="label">0</span></div>
    <div class="swatch light" style="background:#F9FAFC"><span class="hex">F9FAFC</span><span class="label">50</span></div>
    <div class="swatch light" style="background:#F4F7FB"><span class="hex">F4F7FB</span><span class="label">100</span></div>
    <div class="swatch light" style="background:#ECEFF5"><span class="hex">ECEFF5</span><span class="label">150</span></div>
    <div class="swatch light" style="background:#E1E5EF"><span class="hex">E1E5EF</span><span class="label">200</span></div>
    <div class="swatch light" style="background:#C8CFDF"><span class="hex">C8CFDF</span><span class="label">300</span></div>
    <div class="swatch dark"  style="background:#A4ADC4"><span class="hex">A4ADC4</span><span class="label">400</span></div>
    <div class="swatch dark"  style="background:#7C87A4"><span class="hex">7C87A4</span><span class="label">500</span></div>
    <div class="swatch dark"  style="background:#5B6685"><span class="hex">5B6685</span><span class="label">600</span></div>
    <div class="swatch dark"  style="background:#1F2A4A"><span class="hex">1F2A4A</span><span class="label">800</span></div>
    <div class="swatch dark"  style="background:#0A1F17"><span class="hex">0F1A36</span><span class="label">900</span></div>
  </div>
  <div class="desc">본문 = 600 · 헤더 = 900 · 보조 텍스트 = 500 · 디바이더 = 200 · <b>페이지 배경 = 100</b>.</div>
</div></body></html>
