<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--ink-700);}
  .wrap{padding:22px 26px;}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
  .h-name{font-size:14px;font-weight:600;color:var(--ink-900);}
  .meta{font-size:12px;color:var(--ink-500);}
  .display{font-size:54px;font-weight:700;color:var(--ink-900);letter-spacing:-0.03em;line-height:1.05;margin-bottom:18px;}
  .display .blue{color:#00A968;}
  .weights{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;border-top:1px solid #ECEFF5;padding-top:14px;}
  .wcol{font-size:22px;color:var(--ink-900);letter-spacing:-0.015em;}
  .wlabel{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);margin-top:6px;}
</style></head>
<body><div class="wrap">
  <div class="head"><div class="h-name">Pretendard · Specimen</div><div class="meta">한국어 + Latin · 4 weights · 부드러운 hangul rendering</div></div>
  <div class="display">성과를 연결하고,<br/><span class="blue">성장</span>을 가속화합니다.</div>
  <div class="weights">
    <div><div class="wcol" style="font-weight:400">코칭 인사이트 Aa</div><div class="wlabel">Regular · 400</div></div>
    <div><div class="wcol" style="font-weight:500">코칭 인사이트 Aa</div><div class="wlabel">Medium · 500</div></div>
    <div><div class="wcol" style="font-weight:600">코칭 인사이트 Aa</div><div class="wlabel">SemiBold · 600</div></div>
    <div><div class="wcol" style="font-weight:700">코칭 인사이트 Aa</div><div class="wlabel">Bold · 700</div></div>
  </div>
</div></body></html>
